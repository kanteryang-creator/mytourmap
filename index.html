<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>我的香港地图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f5;--surface:#ffffff;--surface2:#fafafa;--surface3:#f1f1f1;
  --border:#e4e4e7;--border2:#d4d4d8;--shadow:0 12px 34px rgba(0,0,0,.08);
  --text:#111111;--muted:#6f6f73;--dim:#9a9aa1;
  --gold:#111111;--gold-bg:#ededed;
  --c-food:#e07b54;--c-cafe:#b8965a;--c-market:#7aab6e;
  --c-heritage:#6a98c8;--c-gallery:#a87ac8;--c-vintage:#c87a8a;
  --c-scenery:#5aab9e;--c-custom:#d1a437;--c-route:#111111;
}
html,body{height:100%;overflow:hidden;background:radial-gradient(circle at top,#ffffff 0,#f7f7f8 48%,#efeff1 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif}
#app{display:flex;flex-direction:column;height:100%}
#topbar{display:flex;align-items:center;background:rgba(17,17,17,.92);border-bottom:1px solid rgba(255,255,255,.08);padding:10px 18px;min-height:68px;flex-shrink:0;z-index:1000;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);}
#logo{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.03em;white-space:nowrap;margin-right:18px;line-height:1}
#logo span{font-family:inherit;font-style:normal;font-size:11px;font-weight:500;color:rgba(255,255,255,.62);display:block;letter-spacing:.02em;margin-top:5px}
#filters{display:flex;gap:8px;align-items:center;flex:1;overflow-x:auto;padding:4px 0}
#filters::-webkit-scrollbar{display:none}
.pill{display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:999px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:rgba(255,255,255,.72);transition:all .18s ease;flex-shrink:0;box-shadow:none;}
.pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pill.active{background:#fff;color:#111;border-color:#fff;box-shadow:none}
#addBtn{display:flex;align-items:center;gap:6px;margin-left:12px;flex-shrink:0;padding:10px 15px;border-radius:999px;cursor:pointer;background:#fff;border:1px solid #fff;color:#111;font-size:12px;font-weight:700;transition:all .18s ease;box-shadow:var(--shadow);}
#addBtn:hover{transform:translateY(-1px)}
#addBtn.active-add{background:#2a2a2d;border-color:#2a2a2d;color:#fff}
#main{display:flex;flex:1;overflow:hidden;position:relative;background:#fff}
#map{flex:1;height:100%}
#sidebar{width:350px;flex-shrink:0;background:rgba(255,255,255,.88);border-left:1px solid rgba(17,17,17,.06);display:flex;flex-direction:column;overflow:hidden;backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);}
#sidebar-header{padding:18px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
#sidebar-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-.02em}
#sidebar-count{font-size:12px;color:var(--muted)}
#card-list{flex:1;overflow-y:auto;padding:12px}
#card-list::-webkit-scrollbar{width:6px}
#card-list::-webkit-scrollbar-thumb{background:#d6d6db;border-radius:99px}
.card{padding:14px 15px;border-radius:22px;cursor:pointer;margin-bottom:10px;border:1px solid var(--border);transition:all .18s ease;display:flex;gap:12px;background:rgba(255,255,255,.96);box-shadow:0 3px 10px rgba(17,17,17,.03);}
.card:hover{transform:translateY(-1px);border-color:var(--border2);box-shadow:0 10px 24px rgba(17,17,17,.08)}
.card.active{background:#fff;border-color:#111;box-shadow:0 12px 28px rgba(17,17,17,.1)}
.card-bar{width:4px;border-radius:99px;flex-shrink:0;align-self:stretch}
.card-name{font-size:15px;font-weight:700;line-height:1.35;margin-bottom:7px;color:var(--text);letter-spacing:-.02em}
.card-tag{font-size:10px;font-weight:700;padding:4px 9px;border-radius:999px}
.card-desc{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.55}
.card-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.card-link-btn{display:inline-flex;align-items:center;justify-content:center;padding:7px 11px;border-radius:999px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;font-weight:700;text-decoration:none;cursor:pointer}
.card-link-btn:hover{background:#111;color:#fff;border-color:#111}
.collection-group-title{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.06em;margin:8px 4px 10px}
.collection-card{padding:16px;border-radius:22px;margin-bottom:12px;border:1px solid var(--border);background:linear-gradient(180deg,#fff 0,#fcfcfc 100%);box-shadow:0 8px 24px rgba(17,17,17,.05)}
.collection-card-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.collection-card-title{font-size:15px;font-weight:800;color:var(--text);line-height:1.35;letter-spacing:-.02em}
.collection-card-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-top:8px}
.collection-card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.collection-card-chip{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;background:var(--surface2);font-size:11px;font-weight:700;color:var(--muted);border:1px solid var(--border)}
.collection-card-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.collection-card-btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 12px;border-radius:999px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;font-weight:700;text-decoration:none;cursor:pointer}
.collection-card-btn.primary{background:#111;color:#fff;border-color:#111}

/* Route panel */
#route-panel{flex:1;overflow-y:auto;display:none;flex-direction:column}
#route-panel.visible{display:flex}
.route-list{padding:12px}
.route-card{padding:16px;border-radius:22px;cursor:pointer;margin-bottom:10px;border:1px solid var(--border);background:#fff;transition:all .18s ease;box-shadow:0 3px 10px rgba(17,17,17,.03);}
.route-card:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(17,17,17,.08)}
.route-card.active{border-color:#111;background:#fff}
.route-card-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:5px;letter-spacing:-.02em}
.route-card-meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.route-stops{margin-top:12px}
.route-stop{display:flex;gap:10px;align-items:flex-start;padding:12px 4px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.route-stop:last-child{border-bottom:none}
.route-stop:hover .route-stop-name,.route-stop.active-stop .route-stop-name{color:#000}
.route-stop-num{width:24px;height:24px;border-radius:50%;background:#111;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.route-stop-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.4}
.route-stop-desc{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.55}
.back-btn{display:flex;align-items:center;gap:6px;padding:14px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:1px solid var(--border);flex-shrink:0;}
.back-btn:hover{color:var(--text)}

/* Modal */
#modal-bg{position:fixed;inset:0;background:rgba(16,16,17,.38);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(12px);}
#modal-bg.open{display:flex}
#modal{background:var(--surface);border:1px solid rgba(17,17,17,.08);border-radius:28px;width:420px;max-width:95vw;box-shadow:0 24px 70px rgba(0,0,0,.14);animation:modalIn .2s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.modal-head{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:18px;font-weight:700;color:var(--text)}
.modal-close{background:var(--surface3);border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px 10px;border-radius:999px}
.modal-body{padding:20px 22px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.01em;color:var(--muted);margin-bottom:7px}
.field input,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:11px 13px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s, box-shadow .2s;}
.field input:focus,.field textarea:focus{border-color:#111;box-shadow:0 0 0 4px rgba(17,17,17,.06)}
.field textarea{resize:vertical;min-height:70px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cat-opt{padding:9px 6px;border-radius:16px;cursor:pointer;text-align:center;border:1px solid var(--border);background:var(--surface2);font-size:11px;color:var(--muted);transition:all .15s;}
.cat-opt.selected{color:var(--text);border-width:1.5px}
.coord-row{display:flex;gap:8px}
.coord-row .field{flex:1;margin-bottom:0}
.coord-hint{font-size:11px;color:var(--muted);margin-top:7px;line-height:1.5}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.btn{padding:10px 18px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);transition:all .2s;font-family:inherit;}
.btn-cancel{background:transparent;color:var(--muted)}
.btn-save{background:#111;border-color:#111;color:#fff}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;border:1px solid #111;color:#fff;font-size:13px;padding:11px 20px;border-radius:999px;z-index:99999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;box-shadow:var(--shadow);}
#toast.show{opacity:1}
#toast.error{background:#982b2b;border-color:#982b2b;color:#fff}
#toast.success{background:#0d7a43;border-color:#0d7a43;color:#fff}
#click-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(17,17,17,.9);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:12px;padding:10px 18px;border-radius:999px;z-index:800;pointer-events:none;display:none;letter-spacing:.01em;box-shadow:var(--shadow);}
#click-hint.visible{display:block}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998;gap:16px;}
#loading.hidden{display:none}
.loading-dots{display:flex;gap:8px}
.loading-dot{width:8px;height:8px;border-radius:50%;background:#111;animation:pulse 1.2s ease infinite;}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.loading-text{font-size:14px;font-weight:600;color:var(--muted);letter-spacing:-.01em}
#empty{padding:38px 18px;text-align:center;font-size:12px;color:var(--dim);line-height:1.8;display:none}
.gm-style .gm-style-iw-c{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:22px!important;padding:0!important;box-shadow:0 18px 50px rgba(0,0,0,.14)!important;}
.gm-style .gm-style-iw-d{overflow:hidden!important}
.gm-style .gm-style-iw-t::after{background:var(--surface)!important}
.gm-style-iw-chr{display:none!important}
.popup-inner{padding:16px 16px 14px;min-width:220px}
.popup-cat{font-size:10px;font-weight:700;letter-spacing:.03em;margin-bottom:8px}
.popup-name{font-size:16px;font-weight:700;margin-bottom:7px;line-height:1.3;color:var(--text)}
.popup-desc{font-size:12px;color:var(--muted);line-height:1.6}
.popup-actions{display:flex;gap:8px;padding:10px 16px 16px;border-top:1px solid var(--border)}
.popup-btn{flex:1;padding:8px 10px;text-align:center;font-size:12px;font-weight:700;border-radius:999px;cursor:pointer;border:1px solid var(--border);color:var(--text);background:var(--surface2);transition:all .15s;}
.popup-btn:hover{background:#111;color:#fff;border-color:#111}
.popup-btn.del{color:#c87a7a}
.popup-btn.del:hover{background:#982b2b;border-color:#982b2b;color:#fff}


/* ===== Mobile / collapsible sidebar V2 ===== */
#main{position:relative;}
#sidebar{
  position:absolute;
  right:0;
  top:0;
  bottom:0;
  z-index:700;
  box-shadow:-24px 0 48px rgba(17,17,17,.08);
  transition:transform .28s ease, box-shadow .28s ease;
}
body.sidebar-collapsed #sidebar{transform:translateX(calc(100% + 12px));}
#sidebar-float-toggle{
  position:absolute;
  right:312px;
  top:14px;
  z-index:980;
  border:1px solid rgba(17,17,17,.08);
  background:rgba(255,255,255,.92);
  color:var(--text);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-radius:999px;
  padding:10px 14px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  box-shadow:var(--shadow);
  font-family:inherit;
  pointer-events:auto;
}
body.sidebar-collapsed #sidebar-float-toggle{right:14px;}
#sidebar-header{position:relative;}
#sidebar-head-toggle{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text);
  border-radius:999px;
  padding:8px 12px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
}

/* Google Maps-like route place overlay */
#route-place-overlay{
  position:absolute;
  z-index:900;
  left:18px;
  bottom:18px;
  width:min(360px, calc(100vw - 36px));
  display:none;
  pointer-events:auto;
}
#route-place-overlay.open{display:block;}
.route-map-card{
  background:#fff;
  color:#202124;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 18px 50px rgba(0,0,0,.14);
  font-family:inherit;
}
.route-map-cover{
  height:132px;
  position:relative;
  background:linear-gradient(135deg,#111 0%,#47474c 52%,#a1a1aa 100%);
}
.route-map-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.42));}
.route-map-close{
  position:absolute;
  right:10px;
  top:10px;
  z-index:2;
  width:34px;
  height:34px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.94);
  color:#333;
  font-size:22px;
  cursor:pointer;
  line-height:34px;
}
.route-map-badge{
  position:absolute;
  left:14px;
  bottom:12px;
  z-index:2;
  background:rgba(255,255,255,.95);
  border-radius:999px;
  padding:6px 10px;
  color:#3c4043;
  font-size:11px;
  font-weight:700;
}
.route-map-body{padding:15px 16px 13px;}
.route-map-kicker{font-size:12px;font-weight:700;color:#5f6368;margin-bottom:5px;}
.route-map-name{font-size:22px;line-height:1.2;font-weight:800;color:#202124;margin-bottom:8px;letter-spacing:-.03em;}
.route-map-meta{font-size:13px;color:#5f6368;line-height:1.5;margin-bottom:10px;}
.route-map-note{font-size:13px;line-height:1.58;color:#3c4043;background:#f5f5f5;border-radius:16px;padding:11px 12px;}
.route-map-note-title{display:block;color:#5f6368;font-size:12px;margin-bottom:4px;}
.route-map-actions{display:flex;gap:8px;padding:10px 12px 13px;border-top:1px solid #ececec;background:#fff;}
.route-map-action{
  flex:1;
  text-align:center;
  border:1px solid #dadce0;
  border-radius:999px;
  padding:9px 8px;
  font-size:13px;
  font-weight:700;
  color:#111;
  text-decoration:none;
  background:#f5f5f5;
  cursor:pointer;
  font-family:inherit;
}
.route-map-action.primary{background:#111;color:#fff;border-color:#111;}
#route-reviews-modal{position:fixed;inset:0;z-index:9997;display:none;align-items:flex-end;justify-content:center;background:rgba(17,17,17,.28);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
#route-reviews-modal.open{display:flex;}
.route-reviews-sheet{width:min(680px,100vw);max-height:min(78vh,760px);background:#fff;border-radius:28px 28px 0 0;box-shadow:0 -24px 60px rgba(0,0,0,.16);overflow:hidden;display:flex;flex-direction:column;}
.route-reviews-handle{width:42px;height:5px;border-radius:999px;background:#d4d4d8;margin:10px auto 0;}
.route-reviews-head{padding:14px 18px 12px;border-bottom:1px solid #ececf0;display:flex;justify-content:space-between;gap:12px;align-items:flex-start;}
.route-reviews-title{font-size:18px;font-weight:800;color:#111;line-height:1.2;letter-spacing:-.03em;}
.route-reviews-sub{font-size:12px;color:#6f6f73;margin-top:4px;line-height:1.45;}
.route-reviews-close{border:none;background:#f3f4f6;color:#111;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;}
.route-reviews-list{padding:10px 16px 18px;overflow:auto;}
.route-review-item{padding:14px 0;border-bottom:1px solid #ececf0;}
.route-review-item:last-child{border-bottom:none;}
.route-review-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:6px;}
.route-review-author{font-size:13px;font-weight:800;color:#111;}
.route-review-time{font-size:11px;color:#6f6f73;margin-top:3px;}
.route-review-stars{font-size:12px;font-weight:700;color:#111;white-space:nowrap;}
.route-review-text{font-size:13px;line-height:1.6;color:#3c4043;}
.route-reviews-empty{padding:18px 2px 8px;font-size:13px;line-height:1.6;color:#6f6f73;}
.route-reviews-foot{padding:0 16px 18px;background:#fff;border-top:1px solid #ececf0;}
.route-reviews-more{display:flex;align-items:center;justify-content:center;width:100%;border:1px solid #dadce0;border-radius:999px;padding:11px 14px;font-size:13px;font-weight:700;color:#111;text-decoration:none;background:#f5f5f5;}

@media (max-width:720px){
  html,body{overflow:hidden;}
  #topbar{height:auto;min-height:64px;padding:10px 12px;gap:8px;align-items:flex-start;}
  #logo{font-size:18px;margin-right:4px;min-width:132px;line-height:1.2;}
  #logo span{font-size:9px;}
  #filters{padding:0;gap:6px;max-height:76px;align-content:flex-start;overflow-x:auto;}
  .pill{font-size:11px;padding:7px 11px;}
  #addBtn{padding:9px 13px;font-size:11px;margin-left:4px;}
  #sidebar{
    left:0;
    right:0;
    top:auto;
    bottom:0;
    width:100%;
    height:46vh;
    border-left:none;
    border-top:1px solid rgba(17,17,17,.08);
    border-radius:26px 26px 0 0;
    box-shadow:0 -20px 46px rgba(17,17,17,.12);
  }
  body.sidebar-collapsed #sidebar{transform:translateY(calc(100% - 48px));}
  #sidebar-header{padding:17px 92px 10px 16px;min-height:48px;}
  #sidebar-header::before{content:'';position:absolute;top:8px;left:50%;width:44px;height:5px;border-radius:99px;background:#d4d4d8;transform:translateX(-50%);}
  #sidebar-head-toggle{right:14px;top:26px;padding:6px 10px;font-size:11px;}
  #sidebar-float-toggle{right:12px;top:auto;bottom:calc(46vh + 12px);padding:8px 12px;font-size:11px;}
  body.sidebar-collapsed #sidebar-float-toggle{bottom:14px;right:12px;}
  #route-place-overlay{left:12px;right:12px;bottom:70px;width:auto;}
  .route-map-cover{height:104px;}
  .route-map-name{font-size:19px;}
  .route-map-actions{padding-bottom:12px;}
  .route-reviews-sheet{max-height:82vh;border-radius:24px 24px 0 0;}
  .route-reviews-head{padding:12px 16px 10px;}
  .route-reviews-title{font-size:17px;}
  .route-reviews-list{padding:8px 14px 16px;}
  .route-reviews-foot{padding:0 14px 16px;}
}

@media (max-width:720px) and (orientation:landscape){
  #topbar{min-height:48px;padding:6px 10px;}
  #logo{font-size:15px;min-width:120px;}
  #filters{max-height:44px;flex-wrap:nowrap;}
  #sidebar{height:58vh;}
  body.sidebar-collapsed #sidebar{transform:translateY(calc(100% - 44px));}
  #sidebar-float-toggle{bottom:calc(58vh + 10px);}
  body.sidebar-collapsed #sidebar-float-toggle{bottom:12px;}
  #route-place-overlay{bottom:58px;width:min(330px, calc(100vw - 24px));}
  .route-map-cover{height:76px;}
  .route-map-body{padding:11px 13px 10px;}
  .route-map-name{font-size:17px;}
  .route-map-note{font-size:12px;max-height:68px;overflow:auto;}
}



/* ===== V3 compact mobile route cards + swipe carousel ===== */
#route-place-overlay{position:absolute;z-index:920;left:0;right:0;bottom:18px;width:auto;display:none;pointer-events:none;}
#route-place-overlay.open{display:block;}
.route-card-track{display:flex;gap:12px;overflow-x:auto;padding:4px 18px 8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;pointer-events:auto;}
.route-card-track::-webkit-scrollbar{display:none;}
.route-mini-card{flex:0 0 min(520px, calc(100vw - 72px));min-height:104px;display:flex;gap:12px;align-items:center;scroll-snap-align:center;background:rgba(255,255,255,.98);color:#202124;border-radius:24px;padding:12px;box-shadow:0 16px 36px rgba(17,17,17,.14);border:1px solid rgba(17,17,17,.08);font-family:inherit;cursor:pointer;transform:scale(.96);opacity:.8;transition:transform .2s ease, opacity .2s ease, box-shadow .2s ease;}
.route-mini-card.active{transform:scale(1);opacity:1;box-shadow:0 18px 42px rgba(17,17,17,.18);border-color:#111;}
.route-mini-img{width:96px;height:80px;border-radius:14px;flex-shrink:0;object-fit:cover;background:linear-gradient(135deg,#d8c09b 0%,#8fa17a 48%,#55706b 100%);}
.route-mini-body{flex:1;min-width:0;}
.route-mini-kicker{font-size:11px;font-weight:700;color:#5f6368;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.route-mini-name{font-size:20px;font-weight:800;color:#202124;line-height:1.18;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.03em;}
.route-mini-meta{font-size:13px;color:#3c4043;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.route-mini-review{margin-top:6px;padding:7px 9px;border-radius:12px;background:#f6f6f7;border:1px solid #ececf0;}
.route-mini-review-head{font-size:11px;font-weight:700;color:#5f6368;margin-bottom:3px;display:flex;gap:6px;align-items:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.route-mini-review-text{font-size:11px;color:#3c4043;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.route-mini-note{font-size:12px;color:#5f6368;margin-top:5px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.route-mini-actions{display:flex;gap:7px;margin-top:8px;}
.route-mini-action{font-size:11px;font-weight:700;color:#111;text-decoration:none;border:1px solid #dadce0;border-radius:999px;padding:6px 10px;background:#f5f5f5;white-space:nowrap;}
.route-mini-action.primary{background:#111;color:#fff;border-color:#111;}
@media (min-width:721px){
  body.route-card-mode #route-place-overlay{display:none!important;}
}
@media (max-width:720px){
  body.route-card-mode.sidebar-collapsed #route-place-overlay{bottom:64px;}
  body.route-card-mode:not(.sidebar-collapsed) #route-place-overlay{bottom:calc(46vh + 12px);opacity:0;transform:translateY(18px);pointer-events:none;}
  .route-card-track{padding-left:14px;padding-right:14px;gap:10px;}
  .route-mini-card{flex-basis:calc(100vw - 54px);min-height:90px;border-radius:16px;padding:10px 11px;}
  .route-mini-img{width:88px;height:68px;border-radius:12px;}
  .route-mini-name{font-size:17px;}
  .route-mini-meta{font-size:12px;}
  .route-mini-review{margin-top:5px;padding:6px 8px;}
  .route-mini-review-head{font-size:10px;}
  .route-mini-review-text{font-size:10px;-webkit-line-clamp:2;}
  .route-mini-note{display:none;}
  .route-mini-actions{margin-top:6px;}
  .route-mini-action{font-size:11px;padding:5px 8px;}
}
@media (max-width:720px) and (orientation:landscape){
  body.route-card-mode.sidebar-collapsed #route-place-overlay{bottom:52px;}
  body.route-card-mode:not(.sidebar-collapsed) #route-place-overlay{bottom:calc(58vh + 8px);opacity:0;transform:translateY(14px);pointer-events:none;}
  .route-mini-card{flex-basis:min(408px, calc(100vw - 68px));min-height:76px;padding:8px 10px;}
  .route-mini-img{width:78px;height:56px;}
  .route-mini-name{font-size:15px;}
  .route-mini-kicker,.route-mini-note,.route-mini-review{display:none;}
  .route-mini-actions{display:none;}
}

function getCollectionStopCacheKey(stop){
  return `${stop.id||stop.name}|${stop.address||''}`;
}

function getResolvedCollectionStop(stop){
  if(Number.isFinite(stop?.lat)&&Number.isFinite(stop?.lng))return stop;
  const cached=getCollectionCoordCache()[getCollectionStopCacheKey(stop)];
  if(cached&&Number.isFinite(cached.lat)&&Number.isFinite(cached.lng)){
    return {...stop,lat:cached.lat,lng:cached.lng};
  }
  return stop;
}

function isLayerActive(layer){
  return activeLayers.has(layer);
}

function getBasePlaceCats(){
  return Object.keys(CATS);
}

function areAllBaseCatsActive(){
  return getBasePlaceCats().every(cat=>activeLayers.has(cat));
}

function getVisiblePlaceCats(){
  const cats=getBasePlaceCats().filter(cat=>activeLayers.has(cat));
  if(cats.length)return cats;
  return [];
}

function getVisiblePlaces(){
  const cats=getVisiblePlaceCats();
  if(!cats.length)return [];
  return places.filter(place=>cats.includes(place.cat));
}

function syncFilterPills(){
  document.querySelectorAll('.pill').forEach(el=>{
    const cat=el.dataset.cat;
    if(cat==='ALL'){
      el.classList.toggle('active',areAllBaseCatsActive());
      return;
    }
    el.classList.toggle('active',isLayerActive(cat));
  });
}

function pickFallbackFocus(){
  if(activeLayers.has('ROUTE'))return 'ROUTE';
  if(activeLayers.has('food'))return 'food';
  const cat=getBasePlaceCats().find(layer=>activeLayers.has(layer));
  return cat||'ALL';
}

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+type;
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='',2500);

async function loadPlaces(){
  const source=getDataSource();
  try{
    const data=await source.fetchPlaces();
    places=Array.isArray(data)&&data.length>0?data:INIT_PLACES;
    if(!Array.isArray(data)||data.length===0)await savePlaces(false);
    nextId=Math.max(...places.map(p=>p.id),0)+1;
  }catch(e){places=INIT_PLACES;nextId=Math.max(...places.map(p=>p.id),0)+1;}
}

async function savePlaces(showToast=true){
  const source=getDataSource();
  try{
    const res=await source.savePlaces(places);
    if(!res.ok)throw new Error();
    if(showToast)toast('已同步保存 ✓','success');
  }catch(e){if(showToast)toast('保存失败，请重试','error');}
}

async function loadMapsApi(key){
  if(window.google?.maps)return;
  if(!mapsApiPromise){
    mapsApiPromise=new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src=`https://maps.googleapis.com/maps/api/js?key=${key}&language=zh-TW&v=weekly`;
      s.async=true;
      s.defer=true;
      s.onload=resolve;
      s.onerror=reject;
      document.head.appendChild(s);
    });
  }
  await mapsApiPromise;
}

async function ensurePlacesLibrary(){
  if(placeService||!window.google?.maps)return placeService;
  const mapProvider=getMapProvider();
  if(!placesLibraryPromise){
    placesLibraryPromise=(async()=>{
      await mapProvider.importPlacesLibrary();
      if(google.maps.places){
        placeService=mapProvider.createPlacesService(map);
      }
      return placeService;
    })().catch(err=>{
      placesLibraryPromise=null;
      throw err;
    });
  }
  try{
    await placesLibraryPromise;
  }catch(e){
    console.warn('Places library load failed',e);
    return null;
  }
  return placeService;
}

function preloadPlacesLibrary(){
  const runner=()=>ensurePlacesLibrary().catch(()=>null);
  if('requestIdleCallback' in window){
    window.requestIdleCallback(runner,{timeout:1800});
  }else{
    setTimeout(runner,1200);
  }
}

function makeMarkerIcon(cat,color){
  const mapProvider=getMapProvider();
  const c=color||((CATS[cat]||CATS.custom).color);
  const icon=CATS[cat]?CATS[cat].icon:'✦';
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="32" height="38" viewBox="0 0 32 38"><path d="M16 0C7.2 0 0 7.2 0 16c0 12 16 22 16 22s16-10 16-22C32 7.2 24.8 0 16 0z" fill="${c}" opacity="0.95"/><circle cx="16" cy="16" r="8" fill="rgba(0,0,0,0.2)"/><text x="16" y="20" text-anchor="middle" font-size="11">${icon}</text></svg>`;
  return{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:mapProvider.createSize(28,34),anchor:mapProvider.createPoint(14,34)};
}

function renderMarkers(){
  const token=++collectionRenderToken;
  Object.values(gmarkers).forEach(m=>m.setMap(null));
  gmarkers={};
  const mapProvider=getMapProvider();
  collectionMarkers.forEach(m=>m&&m.setMap(null));
  collectionMarkers=[];
  getVisiblePlaces().forEach(p=>{
      const m=mapProvider.createMarker({position:{lat:p.lat,lng:p.lng},map,icon:makeMarkerIcon(p.cat),title:p.name});
      m.addListener('click',()=>{
        openPlaceMarkerCard(p);
        focusCard(p.id,false);
      });
      gmarkers[p.id]=m;
  });
  const collection=getActiveFoodCollection();
  if(!collection)return;
  collection.stops.forEach(async(stop,idx)=>{
    const resolved=await resolveCollectionStop(stop);
    if(token!==collectionRenderToken||!Number.isFinite(resolved?.lat)||!Number.isFinite(resolved?.lng))return;
    const marker=mapProvider.createMarker({
      position:{lat:resolved.lat,lng:resolved.lng},
      map,
      icon:makeRouteStopIcon(idx+1,collection.color,activeCollectionId===collection.id&&activeStopIdx===idx),
      title:resolved.name,
      zIndex:activeCollectionId===collection.id&&activeStopIdx===idx?50:10
    });
    marker.addListener('click',()=>showCollectionStop(collection.id,idx,true));
    collectionMarkers[idx]=marker;
  });
}

function escapeHtml(str=''){
  return String(str).replace(/[&<>'\"]/g,ch=>({
    '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','\"':'&quot;'
  }[ch]));
}

function getAmapNavUrl(fromStop,toStop,mode='walk'){
  const toLng=Number(toStop.lng).toFixed(6);
  const toLat=Number(toStop.lat).toFixed(6);
  const toName=encodeURIComponent(toStop.name||'目的地');
  const navMode=mode==='drive'?'car':'walk';
  if(fromStop){
    const fromLng=Number(fromStop.lng).toFixed(6);
    const fromLat=Number(fromStop.lat).toFixed(6);
    const fromName=encodeURIComponent(fromStop.name||'起点');
    return `https://uri.amap.com/navigation?from=${fromLng},${fromLat},${fromName}&to=${toLng},${toLat},${toName}&mode=${navMode}&coordinate=wgs84&callnative=1&src=mytourmap`;
  }
  return `https://uri.amap.com/navigation?to=${toLng},${toLat},${toName}&mode=${navMode}&coordinate=wgs84&callnative=1&src=mytourmap`;
}

function getAmapSchemeUrl(fromStop,toStop,mode='walk'){
  const toLng=Number(toStop.lng).toFixed(6);
  const toLat=Number(toStop.lat).toFixed(6);
  const toName=encodeURIComponent(toStop.name||'目的地');
  const travelType=mode==='drive'?'0':'2';
  if(fromStop){
    const fromLng=Number(fromStop.lng).toFixed(6);
    const fromLat=Number(fromStop.lat).toFixed(6);
    const fromName=encodeURIComponent(fromStop.name||'起点');
    return `amapuri://route/plan/?sourceApplication=mytourmap&slat=${fromLat}&slon=${fromLng}&sname=${fromName}&dlat=${toLat}&dlon=${toLng}&dname=${toName}&dev=0&t=${travelType}`;
  }
  return `amapuri://route/plan/?sourceApplication=mytourmap&dlat=${toLat}&dlon=${toLng}&dname=${toName}&dev=0&t=${travelType}`;
}

function isIosSafari(){
  const ua=navigator.userAgent||'';
  const isIOS=/iP(hone|ad|od)/.test(ua);
  const isSafari=/Safari/i.test(ua)&&!/CriOS|FxiOS|EdgiOS|OPiOS|mercury/i.test(ua);
  return isIOS&&isSafari;
}

function openAmapNavigation(routeId,idx,mode='walk'){
  const route=ROUTES.find(r=>r.id===routeId);
  const toStop=route?.stops?.[idx];
  if(!toStop)return;
  const fromStop=idx>0?route.stops[idx-1]:null;
  const schemeUrl=getAmapSchemeUrl(fromStop,toStop,mode);
  const webUrl=getAmapNavUrl(fromStop,toStop,mode);
  if(isIosSafari()){
    window.location.href=schemeUrl;
    return;
  }
  const startedAt=Date.now();
  const fallbackTimer=setTimeout(()=>{
    if(document.visibilityState==='visible'&&Date.now()-startedAt<1800){
      window.location.replace(webUrl);
    }
  },900);
  const clearFallback=()=>{
    clearTimeout(fallbackTimer);
    document.removeEventListener('visibilitychange',clearFallback);
    window.removeEventListener('pagehide',clearFallback);
    window.removeEventListener('blur',clearFallback);
  };
  document.addEventListener('visibilitychange',clearFallback,{once:true});
  window.addEventListener('pagehide',clearFallback,{once:true});
  window.addEventListener('blur',clearFallback,{once:true});
  window.location.href=schemeUrl;
}

function setFilter(cat){
  activeCard=null;
  infoWindow?.close();
  if(cat==='ALL'){
    const enable=!areAllBaseCatsActive();
    getBasePlaceCats().forEach(layer=>{
      if(enable)activeLayers.add(layer);
      else activeLayers.delete(layer);
    });
    focusedLayer='ALL';
    activeCollectionId=null;
    activeStopIdx=null;
    closeRoutePlaceCard();
    syncFilterPills();
    render();
    return;
  }
  if(isLayerActive(cat)&&focusedLayer!==cat){
    focusedLayer=cat;
    syncFilterPills();
    render();
    if(cat==='ROUTE'&&activeRouteId)showRouteStop(activeRouteId,activeStopIdx??0,false);
    if(cat==='food'&&activeCollectionId)showCollectionStop(activeCollectionId,activeStopIdx??0,false);
    return;
  }
  const nextActive=!isLayerActive(cat);
  if(nextActive)activeLayers.add(cat);
  else activeLayers.delete(cat);
  focusedLayer=nextActive?cat:pickFallbackFocus();
  if(cat==='ROUTE'){
    activeCollectionId=null;
    if(nextActive&&ROUTES.length){
      syncFilterPills();
      render();
      if(!activeRouteId)selectRoute(ROUTES[0].id);
      else selectRoute(activeRouteId);
      return;
    }
    if(!nextActive){
      clearRoute();
      activeRouteId=null;
      activeStopIdx=null;
    }
  }else if(cat==='food'&&!nextActive){
    activeCollectionId=null;
    activeStopIdx=null;
    closeRoutePlaceCard();
  }else if(cat!=='food'){
    activeCollectionId=null;
    activeStopIdx=null;
  }
  syncFilterPills();
  render();
}

async function savePoint(){
  if(saving)return;
  const name=document.getElementById('f-name').value.trim();
  const lat=parseFloat(document.getElementById('f-lat').value);
  const lng=parseFloat(document.getElementById('f-lng').value);
  if(!name){document.getElementById('f-name').focus();toast('请填写地点名称');return;}
  if(isNaN(lat)||isNaN(lng)){toast('请先在地图上点击选点');return;}
  saving=true;
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='保存中…';
  const p={id:nextId++,name,cat:selectedCat,lat,lng,desc:document.getElementById('f-desc').value.trim()};
  places.push(p);closeModal();
  activeLayers.add(p.cat);
  focusedLayer=p.cat;
  syncFilterPills();
  render();
  setTimeout(()=>focusCard(p.id),100);
  await savePlaces();
  saving=false;btn.disabled=false;btn.textContent='保存';
}

async function fetchGoogleStopMeta(s){
  const mapProvider=getMapProvider();
  const cache=getPlaceCache();const key=routeStopCacheKey(s);const now=Date.now();
  if(cache[key]&&cache[key].ts&&now-cache[key].ts<1000*60*60*24*14){return cache[key];}
  const service=await ensurePlacesLibrary();
  if(!service||!google.maps.places){return null;}
  const queryFields=['place_id','name','photos','rating','user_ratings_total','formatted_address','types','geometry'];
  const hasCoords=Number.isFinite(s?.lat)&&Number.isFinite(s?.lng);
  const addressQuery=s.address?`${s.name} ${s.address}`:'';
  const queryVariants=[addressQuery,`${s.name} 香港`,`${s.name} Hong Kong`,s.name].filter(Boolean);
  let place=null;
  for(const query of queryVariants){
    const request={query,fields:queryFields};
    if(hasCoords)request.locationBias=mapProvider.createLatLng(s.lat,s.lng);
    place=await findPlaceFromQueryPromise(request);
    if(place)break;
  }
  if(!place&&hasCoords)place=await nearbySearchPromise({location:mapProvider.createLatLng(s.lat,s.lng),radius:180,keyword:s.name});
  if(!place){
    const fallbackMeta=createStopMeta({ts:now});
    cache[key]=fallbackMeta;setPlaceCache(cache);return fallbackMeta;
  }
  const photo=place.photos&&place.photos[0]?place.photos[0].getUrl({maxWidth:420,maxHeight:280}):'';
  const baseMeta=createStopMeta({
    ts:now,
    placeId:place.place_id||'',
    googleName:place.name||'',
    photo,
    rating:place.rating||'',
    ratingTotal:place.user_ratings_total||'',
    address:place.formatted_address||place.vicinity||s.address||'',
    type:(place.types&&place.types[0])?String(place.types[0]).replace(/_/g,' '):'',
    lat:place.geometry?.location?.lat?place.geometry.location.lat():'',
    lng:place.geometry?.location?.lng?place.geometry.location.lng():'',
  });
  if(!place.place_id){cache[key]=baseMeta;setPlaceCache(cache);return baseMeta;}
  const details=await getPlaceDetailsPromise(place.place_id);
  if(details){
    const reviews=Array.isArray(details.reviews)?details.reviews.slice(0,5).map(r=>({author:r.author_name||'Google 用户',ago:r.relative_time_description||'',rating:r.rating||'',text:r.text||''})).filter(r=>r.text):[];
    const firstReview=reviews[0]||null;
    const meta={...baseMeta,reviewText:firstReview?.text||'',reviewAuthor:firstReview?.author||'',reviewAgo:firstReview?.ago||'',reviewsUri:details.url||'',reviews};
    cache[key]=meta;setPlaceCache(cache);return meta;
  }
  cache[key]=baseMeta;setPlaceCache(cache);return baseMeta;
}

async function resolveCollectionStop(stop){
  const resolved=getResolvedCollectionStop(stop);
  if(Number.isFinite(resolved?.lat)&&Number.isFinite(resolved?.lng))return resolved;
  const meta=await fetchPlaceMetaForStop(stop);
  const metaCoords=(meta&&Number.isFinite(meta.lat)&&Number.isFinite(meta.lng))?meta:null;
  if(metaCoords){
    const next={...stop,lat:meta.lat,lng:meta.lng};
    const cache=getCollectionCoordCache();
    cache[getCollectionStopCacheKey(stop)]={lat:meta.lat,lng:meta.lng,ts:Date.now()};
    setCollectionCoordCache(cache);
    return next;
  }
  if(!geocoder)return stop;
  const address=[stop.name,stop.address].filter(Boolean).join(' ');
  const next=await new Promise(resolve=>{
    geocoder.geocode({address},(results,status)=>{
      if(status==='OK'&&results?.[0]?.geometry?.location){
        const loc=results[0].geometry.location;
        resolve({...stop,lat:loc.lat(),lng:loc.lng()});
        return;
      }
      resolve(stop);
    });
  });
  if(Number.isFinite(next?.lat)&&Number.isFinite(next?.lng)){
    const cache=getCollectionCoordCache();
    cache[getCollectionStopCacheKey(stop)]={lat:next.lat,lng:next.lng,ts:Date.now()};
    setCollectionCoordCache(cache);
  }
  return next;
}

function buildFallbackSegmentPath(fromStop,toStop){
  return [
    {lat:fromStop.lat,lng:fromStop.lng},
    {lat:toStop.lat,lng:toStop.lng},
  ];
}
async function fetchWalkingSegment(fromStop,toStop){
  const mapProvider=getMapProvider();
  const key=getWalkSegmentCacheKey(fromStop,toStop);
  const cache=getWalkRouteCache();
  const cached=cache[key];
  if(cached?.path?.length){
    return {...cached,fromStop,toStop};
  }
  if(!directionsService||!mapProvider.walkingTravelMode){
    return null;
  }
  const result=await new Promise(resolve=>{
    directionsService.route({
      origin:{lat:fromStop.lat,lng:fromStop.lng},
      destination:{lat:toStop.lat,lng:toStop.lng},
      travelMode:mapProvider.walkingTravelMode(),
      provideRouteAlternatives:false,
    },(response,status)=>{
      if(!mapProvider.isDirectionsStatusOk(status)||!response?.routes?.[0]){
        resolve(null);
        return;
      }
      const leg=response.routes[0].legs?.[0];
      const overview=response.routes[0].overview_path||[];
      const path=overview.map(point=>({lat:point.lat(),lng:point.lng()}));
      resolve(path.length?{
        path,
        distanceText:leg?.distance?.text||'',
        durationText:leg?.duration?.text||'',
      }:null);
    });
  });
  if(!result)return null;
  cache[key]={...result,ts:Date.now()};
  setWalkRouteCache(cache);
  return {...result,fromStop,toStop};
}
function getActiveWalkSegmentIndex(idx,segmentCount){
  if(segmentCount<=0)return -1;
  if(idx<=0)return 0;
  if(idx>=segmentCount)return segmentCount-1;
  return idx;
}
function clearRouteWalkPolylines(){
  routeWalkPolylines.forEach(line=>line.setMap(null));
  routeWalkPolylines=[];
  activeRouteSegments=[];
}
function drawRouteWalkSegments(route,segments){
  const mapProvider=getMapProvider();
  clearRouteWalkPolylines();
  activeRouteSegments=segments;
  routeWalkPolylines=segments.map((segment,idx)=>mapProvider.createPolyline({
    path:segment.path,
    map,
    strokeColor:route.color,
    strokeOpacity:0.42,
    strokeWeight:4,
    zIndex:4,
  }));
  updateRouteWalkHighlight(activeStopIdx??0);
}
function updateRouteWalkHighlight(idx){
  if(!routeWalkPolylines.length)return;
  const activeIdx=getActiveWalkSegmentIndex(idx,routeWalkPolylines.length);
  routeWalkPolylines.forEach((line,i)=>{
    line.setOptions({
      strokeOpacity:i===activeIdx?0.96:0.38,
      strokeWeight:i===activeIdx?7:4,
      zIndex:i===activeIdx?12:4,
      icons:i===activeIdx?[{icon:getMapProvider().forwardArrow((ROUTES.find(r=>r.id===activeRouteId)?.color)||'#111',3.4),offset:'100%',repeat:'96px'}]:[],
    });
  });
}
async function loadWalkingRouteSegments(route,token){
  const segments=[];
  for(let i=0;i<route.stops.length-1;i++){
    const fromStop=route.stops[i];
    const toStop=route.stops[i+1];
    const walked=await fetchWalkingSegment(fromStop,toStop);
    segments.push({
      fromStop,
      toStop,
      path:walked?.path?.length?walked.path:buildFallbackSegmentPath(fromStop,toStop),
      isReal:!!walked?.path?.length,
      distanceText:walked?.distanceText||'',
      durationText:walked?.durationText||'',
    });
    if(token!==routeWalkLoadToken)return;
  }
  if(token!==routeWalkLoadToken)return;
  if(routePolyline){routePolyline.setMap(null);routePolyline=null;}
  drawRouteWalkSegments(route,segments);
}

  const el=document.getElementById('route-place-overlay');
  if(!el)return;
  el.innerHTML=buildRouteMapCard(route,s,idx);
  el.classList.add('open');
}
async function openPlaceMarkerCard(place){
  activePlaceOverlayId=place.id;
  closeRoutePlaceCard();
  const el=document.getElementById('route-place-overlay');
  if(!el)return;
  if(shouldUseMobileRouteCards()){
    el.innerHTML=`<div class="route-card-track" id="route-card-track">${buildPlaceMiniCard(place)}</div>`;
    el.classList.add('open');
  }else{
    el.innerHTML=buildPlaceMapCard(place,{});
    el.classList.add('open');
  }
  const meta=await fetchPlaceMetaForStop(place);
  if(activePlaceOverlayId!==place.id)return;
  if(shouldUseMobileRouteCards()){
    el.innerHTML=`<div class="route-card-track" id="route-card-track">${buildPlaceMiniCard(place,meta||{})}</div>`;
  }else{
    el.innerHTML=buildPlaceMapCard(place,meta||{});
  }
  el.classList.add('open');
}
function renderRouteCardStrip(route){
  const el=document.getElementById('route-place-overlay');if(!el||!route)return;
  if(!shouldUseMobileRouteCards()){closeRoutePlaceCard();return;}
  activeStopIdx=activeStopIdx??0;document.body.classList.add('route-card-mode');
  el.innerHTML=`<div class="route-card-track" id="route-card-track">${route.stops.map((s,i)=>buildRouteMiniCard(route,s,i)).join('')}</div>`;el.classList.add('open');
  const track=document.getElementById('route-card-track');
  if(track){track.addEventListener('scroll',()=>{clearTimeout(routeCardScrollTimer);routeCardScrollTimer=setTimeout(()=>syncRouteCardFromScroll(route.id),90);},{passive:true});}
  hydrateRouteCards(route);requestAnimationFrame(()=>showRouteStop(route.id,activeStopIdx,false));
}
async function hydrateRouteCards(route){
  for(let i=0;i<route.stops.length;i++){
    const meta=await fetchPlaceMetaForStop(route.stops[i]);if(!meta)continue;
    const old=document.getElementById(`route-mini-${i}`);if(old){const wrapper=document.createElement('div');wrapper.innerHTML=buildRouteMiniCard(route,route.stops[i],i,meta).trim();old.replaceWith(wrapper.firstElementChild);}
  }
}
async function hydrateCollectionCards(collection){
  for(let i=0;i<collection.stops.length;i++){
    const resolved=await resolveCollectionStop(collection.stops[i]);
    const meta=await fetchPlaceMetaForStop(resolved);
    const old=document.getElementById(`collection-mini-${i}`);
    if(old){
      const wrapper=document.createElement('div');
      wrapper.innerHTML=buildCollectionMiniCard(collection,resolved,i,meta).trim();
      old.replaceWith(wrapper.firstElementChild);
    }
  }
}
function syncRouteCardFromScroll(routeId){
  const track=document.getElementById('route-card-track');if(!track)return;const cards=[...track.querySelectorAll('.route-mini-card')];const center=track.scrollLeft+track.clientWidth/2;let best=0,bestDist=Infinity;
  cards.forEach(card=>{const c=card.offsetLeft+card.offsetWidth/2;const d=Math.abs(c-center);if(d<bestDist){bestDist=d;best=Number(card.dataset.stopIdx)||0;}});
  if(best!==activeStopIdx)showRouteStop(routeId,best,false);
}
function updateRouteCardActive(idx,scrollToCard=true){document.querySelectorAll('.route-mini-card').forEach(card=>card.classList.toggle('active',Number(card.dataset.stopIdx)===idx));if(scrollToCard){document.getElementById(`route-mini-${idx}`)?.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}}
function updateRouteMarkerActive(route,idx){routeMarkers.forEach((m,i)=>{m.setIcon(makeRouteStopIcon(i+1,route.color,i===idx));m.setZIndex(i===idx?50:10);});}
function syncCollectionCardFromScroll(collectionId){
  const track=document.getElementById('route-card-track');if(!track)return;const cards=[...track.querySelectorAll('.route-mini-card')];const center=track.scrollLeft+track.clientWidth/2;let best=0,bestDist=Infinity;
  cards.forEach(card=>{const c=card.offsetLeft+card.offsetWidth/2;const d=Math.abs(c-center);if(d<bestDist){bestDist=d;best=Number(card.dataset.stopIdx)||0;}});
  if(best!==activeStopIdx)showCollectionStop(collectionId,best,false);
}
function updateCollectionCardActive(idx,scrollToCard=true){document.querySelectorAll('.route-mini-card').forEach(card=>card.classList.toggle('active',Number(card.dataset.stopIdx)===idx));if(scrollToCard){document.getElementById(`collection-mini-${idx}`)?.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}}
function updateCollectionMarkerActive(collection,idx){collectionMarkers.forEach((marker,i)=>{if(!marker)return;marker.setIcon(makeRouteStopIcon(i+1,collection.color,i===idx));marker.setZIndex(i===idx?50:10);});}
function makeRouteStopIcon(num,color,active=false){
  const mapProvider=getMapProvider();
  const fill=active?'#111009':color;const ring=active?color:'rgba(0,0,0,0.3)';const scale=active?34:30, anchorX=active?17:15, anchorY=active?40:36;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="38" height="44" viewBox="0 0 32 38"><path d="M16 0C7.2 0 0 7.2 0 16c0 12 16 22 16 22s16-10 16-22C32 7.2 24.8 0 16 0z" fill="${fill}" opacity="0.98"/><circle cx="16" cy="16" r="10" fill="${ring}"/><text x="16" y="20.8" text-anchor="middle" font-size="11" font-weight="800" fill="white" font-family="Arial, sans-serif">${num}</text></svg>`;
  return{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:mapProvider.createSize(scale,anchorY),anchor:mapProvider.createPoint(anchorX,anchorY)};
}
function openFoodCollection(id){
  activeLayers.add('food');
  focusedLayer='food';
  activeCollectionId=id;
  activeStopIdx=0;
  syncFilterPills();
  render();
}
function toggleFoodCollectionOverlay(id){
  if(activeCollectionId===id){
    activeCollectionId=null;
    activeStopIdx=null;
    closeRoutePlaceCard();
    render();
    return;
  }
  openFoodCollection(id);
}
function renderCollectionCardStrip(collection){
  const el=document.getElementById('route-place-overlay');if(!el||!collection)return;
  if(!shouldUseMobileRouteCards()){closeRoutePlaceCard();return;}
  activeStopIdx=activeStopIdx??0;document.body.classList.add('route-card-mode');
  el.innerHTML=`<div class="route-card-track" id="route-card-track">${collection.stops.map((s,i)=>buildCollectionMiniCard(collection,getResolvedCollectionStop(s),i)).join('')}</div>`;el.classList.add('open');
  const track=document.getElementById('route-card-track');
  if(track){track.addEventListener('scroll',()=>{clearTimeout(routeCardScrollTimer);routeCardScrollTimer=setTimeout(()=>syncCollectionCardFromScroll(collection.id),90);},{passive:true});}
  hydrateCollectionCards(collection);requestAnimationFrame(()=>showCollectionStop(collection.id,activeStopIdx,false));
}
async function showCollectionStop(collectionId,idx,scrollCard=true){
  const collection=getFoodCollection(collectionId);
  const stop=collection?.stops?.[idx];
  if(!collection||!stop)return;
  activeCollectionId=collectionId;
  focusedLayer='food';
  activeStopIdx=idx;
  const resolved=await resolveCollectionStop(stop);
  if(shouldUseMobileRouteCards()){
    updateCollectionCardActive(idx,scrollCard);
  }else{
    const el=document.getElementById('route-place-overlay');
    if(el){
      el.innerHTML=buildCollectionMapCard(collection,resolved,idx);
      el.classList.add('open');
    }
  }
  updateCollectionCardActive(idx,scrollCard);
  updateCollectionMarkerActive(collection,idx);
  if(Number.isFinite(resolved?.lat)&&Number.isFinite(resolved?.lng)){
    map.panTo({lat:resolved.lat,lng:resolved.lng});
    const marker=collectionMarkers[idx];
    if(marker)getMapProvider().bounceMarker(marker);
    if(map.getZoom()<15)map.setZoom(15);
  }
  document.querySelectorAll('.route-stop').forEach((el,i)=>el.classList.toggle('active-stop',i===idx));
  document.getElementById(`cstop-${idx}`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function selectRoute(id){
  const mapProvider=getMapProvider();
  activeLayers.add('ROUTE');
  focusedLayer='ROUTE';
  activeRouteId=id;activeStopIdx=0;const route=ROUTES.find(r=>r.id===id);if(!route)return;clearRoute();
  routeWalkLoadToken+=1;
  const currentToken=routeWalkLoadToken;
  const path=route.stops.map(s=>({lat:s.lat,lng:s.lng}));
  routePolyline=mapProvider.createPolyline({path,map,strokeColor:route.color,strokeOpacity:0.86,strokeWeight:4,icons:[{icon:mapProvider.forwardArrow(route.color,3.2),offset:'100%',repeat:'76px'}]});
  route.stops.forEach((s,i)=>{const m=mapProvider.createMarker({position:{lat:s.lat,lng:s.lng},map,icon:makeRouteStopIcon(i+1,route.color,i===0),title:s.name,zIndex:i===0?50:10});m.addListener('click',()=>showRouteStop(id,i,true));routeMarkers.push(m);});
  const bounds=mapProvider.createBounds();route.stops.forEach(s=>mapProvider.extendBounds(bounds,{lat:s.lat,lng:s.lng}));mapProvider.fitBounds(map,bounds,getMapPadding());renderRoutePanel();showRouteDetail(id);if(isMobileLayout())setSidebarCollapsed(true);renderRouteCardStrip(route);
  loadWalkingRouteSegments(route,currentToken).catch(err=>console.warn('Walking route load failed',err));
}
function showRouteStop(routeId,idx,scrollCard=true){
  const mapProvider=getMapProvider();
  focusedLayer='ROUTE';
  activeStopIdx=idx;activeRouteId=routeId;const route=ROUTES.find(r=>r.id===routeId);if(!route||!route.stops[idx])return;const s=route.stops[idx];
  if(shouldUseMobileRouteCards()){}else openRoutePlaceCard(route,s,idx);
  updateRouteCardActive(idx,scrollCard);updateRouteMarkerActive(route,idx);updateRouteWalkHighlight(idx);map.panTo({lat:s.lat,lng:s.lng});if(routeMarkers[idx])mapProvider.bounceMarker(routeMarkers[idx]);if(map.getZoom()<15)map.setZoom(15);
  document.querySelectorAll('.route-stop').forEach((el,i)=>el.classList.toggle('active-stop',i===idx));document.getElementById(`rstop-${idx}`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeRoutePlaceCard(){const el=document.getElementById('route-place-overlay');if(el){el.classList.remove('open');el.innerHTML='';}document.body.classList.remove('route-card-mode');}
function clearRoute(){activePlaceOverlayId=null;closeRoutePlaceCard();routeWalkLoadToken+=1;clearRouteWalkPolylines();routeMarkers.forEach(m=>m.setMap(null));routeMarkers=[];if(routePolyline){routePolyline.setMap(null);routePolyline=null;}}


document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))closeModal();});
document.getElementById('route-reviews-modal').addEventListener('click',e=>{if(e.target===document.getElementById('route-reviews-modal'))closeRouteReviews();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeRouteReviews();}});

initMap().catch(e=>{console.error(e);toast('地图加载失败','error');document.getElementById('loading').classList.add('hidden');});
</script>
