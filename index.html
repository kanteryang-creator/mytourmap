<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>我的香港地图</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f5;--surface:#ffffff;--surface2:#fafafa;--surface3:#f1f1f1;
  --border:#e4e4e7;--border2:#d4d4d8;--shadow:0 12px 34px rgba(0,0,0,.08);
  --text:#111111;--muted:#6f6f73;--dim:#9a9aa1;
  --gold:#111111;--gold-bg:#ededed;
  --c-food:#e07b54;--c-cafe:#b8965a;--c-market:#7aab6e;
  --c-heritage:#6a98c8;--c-gallery:#a87ac8;--c-vintage:#c87a8a;
  --c-scenery:#5aab9e;--c-custom:#d1a437;--c-route:#111111;
}
html,body{height:100%;overflow:hidden;background:radial-gradient(circle at top,#ffffff 0,#f7f7f8 48%,#efeff1 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif}
#app{display:flex;flex-direction:column;height:100%}
#topbar{display:flex;align-items:center;background:rgba(17,17,17,.92);border-bottom:1px solid rgba(255,255,255,.08);padding:10px 18px;min-height:68px;flex-shrink:0;z-index:1000;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);}
#logo{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.03em;white-space:nowrap;margin-right:18px;line-height:1}
#logo span{font-family:inherit;font-style:normal;font-size:11px;font-weight:500;color:rgba(255,255,255,.62);display:block;letter-spacing:.02em;margin-top:5px}
#filters{display:flex;gap:8px;align-items:center;flex:1;overflow-x:auto;padding:4px 0}
#filters::-webkit-scrollbar{display:none}
.pill{display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:999px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:rgba(255,255,255,.72);transition:all .18s ease;flex-shrink:0;box-shadow:none;}
.pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pill.active{background:#fff;color:#111;border-color:#fff;box-shadow:none}
#addBtn{display:flex;align-items:center;gap:6px;margin-left:12px;flex-shrink:0;padding:10px 15px;border-radius:999px;cursor:pointer;background:#fff;border:1px solid #fff;color:#111;font-size:12px;font-weight:700;transition:all .18s ease;box-shadow:var(--shadow);}
#addBtn:hover{transform:translateY(-1px)}
#addBtn.active-add{background:#2a2a2d;border-color:#2a2a2d;color:#fff}
#main{display:flex;flex:1;overflow:hidden;position:relative;background:#fff}
#map{flex:1;height:100%}
#sidebar{width:350px;flex-shrink:0;background:rgba(255,255,255,.88);border-left:1px solid rgba(17,17,17,.06);display:flex;flex-direction:column;overflow:hidden;backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);}
#sidebar-header{padding:18px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
#sidebar-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-.02em}
#sidebar-count{font-size:12px;color:var(--muted)}
#card-list{flex:1;overflow-y:auto;padding:12px}
#card-list::-webkit-scrollbar{width:6px}
#card-list::-webkit-scrollbar-thumb{background:#d6d6db;border-radius:99px}
.card{padding:14px 15px;border-radius:22px;cursor:pointer;margin-bottom:10px;border:1px solid var(--border);transition:all .18s ease;display:flex;gap:12px;background:rgba(255,255,255,.96);box-shadow:0 3px 10px rgba(17,17,17,.03);}
.card:hover{transform:translateY(-1px);border-color:var(--border2);box-shadow:0 10px 24px rgba(17,17,17,.08)}
.card.active{background:#fff;border-color:#111;box-shadow:0 12px 28px rgba(17,17,17,.1)}
.card-bar{width:4px;border-radius:99px;flex-shrink:0;align-self:stretch}
.card-name{font-size:15px;font-weight:700;line-height:1.35;margin-bottom:7px;color:var(--text);letter-spacing:-.02em}
.card-tag{font-size:10px;font-weight:700;padding:4px 9px;border-radius:999px}
.card-desc{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.55}

/* Route panel */
#route-panel{flex:1;overflow-y:auto;display:none;flex-direction:column}
#route-panel.visible{display:flex}
.route-list{padding:12px}
.route-card{padding:16px;border-radius:22px;cursor:pointer;margin-bottom:10px;border:1px solid var(--border);background:#fff;transition:all .18s ease;box-shadow:0 3px 10px rgba(17,17,17,.03);}
.route-card:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(17,17,17,.08)}
.route-card.active{border-color:#111;background:#fff}
.route-card-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:5px;letter-spacing:-.02em}
.route-card-meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.route-stops{margin-top:12px}
.route-stop{display:flex;gap:10px;align-items:flex-start;padding:12px 4px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.route-stop:last-child{border-bottom:none}
.route-stop:hover .route-stop-name,.route-stop.active-stop .route-stop-name{color:#000}
.route-stop-num{width:24px;height:24px;border-radius:50%;background:#111;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.route-stop-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.4}
.route-stop-desc{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.55}
.back-btn{display:flex;align-items:center;gap:6px;padding:14px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:1px solid var(--border);flex-shrink:0;}
.back-btn:hover{color:var(--text)}

/* Modal */
#modal-bg{position:fixed;inset:0;background:rgba(16,16,17,.38);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(12px);}
#modal-bg.open{display:flex}
#modal{background:var(--surface);border:1px solid rgba(17,17,17,.08);border-radius:28px;width:420px;max-width:95vw;box-shadow:0 24px 70px rgba(0,0,0,.14);animation:modalIn .2s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.modal-head{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:18px;font-weight:700;color:var(--text)}
.modal-close{background:var(--surface3);border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px 10px;border-radius:999px}
.modal-body{padding:20px 22px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.01em;color:var(--muted);margin-bottom:7px}
.field input,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:11px 13px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s, box-shadow .2s;}
.field input:focus,.field textarea:focus{border-color:#111;box-shadow:0 0 0 4px rgba(17,17,17,.06)}
.field textarea{resize:vertical;min-height:70px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cat-opt{padding:9px 6px;border-radius:16px;cursor:pointer;text-align:center;border:1px solid var(--border);background:var(--surface2);font-size:11px;color:var(--muted);transition:all .15s;}
.cat-opt.selected{color:var(--text);border-width:1.5px}
.coord-row{display:flex;gap:8px}
.coord-row .field{flex:1;margin-bottom:0}
.coord-hint{font-size:11px;color:var(--muted);margin-top:7px;line-height:1.5}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.btn{padding:10px 18px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);transition:all .2s;font-family:inherit;}
.btn-cancel{background:transparent;color:var(--muted)}
.btn-save{background:#111;border-color:#111;color:#fff}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;border:1px solid #111;color:#fff;font-size:13px;padding:11px 20px;border-radius:999px;z-index:99999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;box-shadow:var(--shadow);}
#toast.show{opacity:1}
#toast.error{background:#982b2b;border-color:#982b2b;color:#fff}
#toast.success{background:#0d7a43;border-color:#0d7a43;color:#fff}
#click-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(17,17,17,.9);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:12px;padding:10px 18px;border-radius:999px;z-index:800;pointer-events:none;display:none;letter-spacing:.01em;box-shadow:var(--shadow);}
#click-hint.visible{display:block}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998;gap:16px;}
#loading.hidden{display:none}
.loading-dots{display:flex;gap:8px}
.loading-dot{width:8px;height:8px;border-radius:50%;background:#111;animation:pulse 1.2s ease infinite;}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.loading-text{font-size:14px;font-weight:600;color:var(--muted);letter-spacing:-.01em}
#empty{padding:38px 18px;text-align:center;font-size:12px;color:var(--dim);line-height:1.8;display:none}
.gm-style .gm-style-iw-c{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:22px!important;padding:0!important;box-shadow:0 18px 50px rgba(0,0,0,.14)!important;}
.gm-style .gm-style-iw-d{overflow:hidden!important}
.gm-style .gm-style-iw-t::after{background:var(--surface)!important}
.gm-style-iw-chr{display:none!important}
.popup-inner{padding:16px 16px 14px;min-width:220px}
.popup-cat{font-size:10px;font-weight:700;letter-spacing:.03em;margin-bottom:8px}
.popup-name{font-size:16px;font-weight:700;margin-bottom:7px;line-height:1.3;color:var(--text)}
.popup-desc{font-size:12px;color:var(--muted);line-height:1.6}
.popup-actions{display:flex;gap:8px;padding:10px 16px 16px;border-top:1px solid var(--border)}
.popup-btn{flex:1;padding:8px 10px;text-align:center;font-size:12px;font-weight:700;border-radius:999px;cursor:pointer;border:1px solid var(--border);color:var(--text);background:var(--surface2);transition:all .15s;}
.popup-btn:hover{background:#111;color:#fff;border-color:#111}
.popup-btn.del{color:#c87a7a}
.popup-btn.del:hover{background:#982b2b;border-color:#982b2b;color:#fff}


/* ===== Mobile / collapsible sidebar V2 ===== */
#main{position:relative;}
#sidebar{
  position:absolute;
  right:0;
  top:0;
  bottom:0;
  z-index:700;
  box-shadow:-24px 0 48px rgba(17,17,17,.08);
  transition:transform .28s ease, box-shadow .28s ease;
}
body.sidebar-collapsed #sidebar{transform:translateX(calc(100% + 12px));}
#sidebar-float-toggle{
  position:absolute;
  right:312px;
  top:14px;
  z-index:850;
  border:1px solid rgba(17,17,17,.08);
  background:rgba(255,255,255,.92);
  color:var(--text);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-radius:999px;
  padding:10px 14px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  box-shadow:var(--shadow);
  font-family:inherit;
}
body.sidebar-collapsed #sidebar-float-toggle{right:14px;}
#sidebar-header{position:relative;}
#sidebar-head-toggle{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text);
  border-radius:999px;
  padding:8px 12px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
}

/* Google Maps-like route place overlay */
#route-place-overlay{
  position:absolute;
  z-index:900;
  left:18px;
  bottom:18px;
  width:min(360px, calc(100vw - 36px));
  display:none;
  pointer-events:auto;
}
#route-place-overlay.open{display:block;}
.route-map-card{
  background:#fff;
  color:#202124;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 18px 50px rgba(0,0,0,.14);
  font-family:inherit;
}
.route-map-cover{
  height:132px;
  position:relative;
  background:linear-gradient(135deg,#111 0%,#47474c 52%,#a1a1aa 100%);
}
.route-map-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.42));}
.route-map-close{
  position:absolute;
  right:10px;
  top:10px;
  z-index:2;
  width:34px;
  height:34px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.94);
  color:#333;
  font-size:22px;
  cursor:pointer;
  line-height:34px;
}
.route-map-badge{
  position:absolute;
  left:14px;
  bottom:12px;
  z-index:2;
  background:rgba(255,255,255,.95);
  border-radius:999px;
  padding:6px 10px;
  color:#3c4043;
  font-size:11px;
  font-weight:700;
}
.route-map-body{padding:15px 16px 13px;}
.route-map-kicker{font-size:12px;font-weight:700;color:#5f6368;margin-bottom:5px;}
.route-map-name{font-size:22px;line-height:1.2;font-weight:800;color:#202124;margin-bottom:8px;letter-spacing:-.03em;}
.route-map-meta{font-size:13px;color:#5f6368;line-height:1.5;margin-bottom:10px;}
.route-map-note{font-size:13px;line-height:1.58;color:#3c4043;background:#f5f5f5;border-radius:16px;padding:11px 12px;}
.route-map-note-title{display:block;color:#5f6368;font-size:12px;margin-bottom:4px;}
.route-map-actions{display:flex;gap:8px;padding:10px 12px 13px;border-top:1px solid #ececec;background:#fff;}
.route-map-action{
  flex:1;
  text-align:center;
  border:1px solid #dadce0;
  border-radius:999px;
  padding:9px 8px;
  font-size:13px;
  font-weight:700;
  color:#111;
  text-decoration:none;
  background:#f5f5f5;
  cursor:pointer;
  font-family:inherit;
}
.route-map-action.primary{background:#111;color:#fff;border-color:#111;}

@media (max-width:720px){
  html,body{overflow:hidden;}
  #topbar{height:auto;min-height:64px;padding:10px 12px;gap:8px;align-items:flex-start;}
  #logo{font-size:18px;margin-right:4px;min-width:132px;line-height:1.2;}
  #logo span{font-size:9px;}
  #filters{padding:0;gap:6px;max-height:76px;align-content:flex-start;overflow-x:auto;}
  .pill{font-size:11px;padding:7px 11px;}
  #addBtn{padding:9px 13px;font-size:11px;margin-left:4px;}
  #sidebar{
    left:0;
    right:0;
    top:auto;
    bottom:0;
    width:100%;
    height:46vh;
    border-left:none;
    border-top:1px solid rgba(17,17,17,.08);
    border-radius:26px 26px 0 0;
    box-shadow:0 -20px 46px rgba(17,17,17,.12);
  }
  body.sidebar-collapsed #sidebar{transform:translateY(calc(100% - 48px));}
  #sidebar-header{padding:17px 92px 10px 16px;min-height:48px;}
  #sidebar-header::before{content:'';position:absolute;top:8px;left:50%;width:44px;height:5px;border-radius:99px;background:#d4d4d8;transform:translateX(-50%);}
  #sidebar-head-toggle{right:14px;top:26px;padding:6px 10px;font-size:11px;}
  #sidebar-float-toggle{right:12px;top:auto;bottom:calc(46vh + 12px);padding:8px 12px;font-size:11px;}
  body.sidebar-collapsed #sidebar-float-toggle{bottom:14px;right:12px;}
  #route-place-overlay{left:12px;right:12px;bottom:70px;width:auto;}
  .route-map-cover{height:104px;}
  .route-map-name{font-size:19px;}
  .route-map-actions{padding-bottom:12px;}
}

@media (max-width:720px) and (orientation:landscape){
  #topbar{min-height:48px;padding:6px 10px;}
  #logo{font-size:15px;min-width:120px;}
  #filters{max-height:44px;flex-wrap:nowrap;}
  #sidebar{height:58vh;}
  body.sidebar-collapsed #sidebar{transform:translateY(calc(100% - 44px));}
  #sidebar-float-toggle{bottom:calc(58vh + 10px);}
  body.sidebar-collapsed #sidebar-float-toggle{bottom:12px;}
  #route-place-overlay{bottom:58px;width:min(330px, calc(100vw - 24px));}
  .route-map-cover{height:76px;}
  .route-map-body{padding:11px 13px 10px;}
  .route-map-name{font-size:17px;}
  .route-map-note{font-size:12px;max-height:68px;overflow:auto;}
}



/* ===== V3 compact mobile route cards + swipe carousel ===== */
#route-place-overlay{position:absolute;z-index:920;left:0;right:0;bottom:18px;width:auto;display:none;pointer-events:none;}
#route-place-overlay.open{display:block;}
.route-card-track{display:flex;gap:12px;overflow-x:auto;padding:4px 18px 8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;pointer-events:auto;}
.route-card-track::-webkit-scrollbar{display:none;}
.route-mini-card{flex:0 0 min(520px, calc(100vw - 72px));min-height:104px;display:flex;gap:12px;align-items:center;scroll-snap-align:center;background:rgba(255,255,255,.98);color:#202124;border-radius:24px;padding:12px;box-shadow:0 16px 36px rgba(17,17,17,.14);border:1px solid rgba(17,17,17,.08);font-family:inherit;cursor:pointer;transform:scale(.96);opacity:.8;transition:transform .2s ease, opacity .2s ease, box-shadow .2s ease;}
.route-mini-card.active{transform:scale(1);opacity:1;box-shadow:0 18px 42px rgba(17,17,17,.18);border-color:#111;}
.route-mini-img{width:96px;height:80px;border-radius:14px;flex-shrink:0;object-fit:cover;background:linear-gradient(135deg,#d8c09b 0%,#8fa17a 48%,#55706b 100%);}
.route-mini-body{flex:1;min-width:0;}
.route-mini-kicker{font-size:11px;font-weight:700;color:#5f6368;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.route-mini-name{font-size:20px;font-weight:800;color:#202124;line-height:1.18;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.03em;}
.route-mini-meta{font-size:13px;color:#3c4043;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.route-mini-note{font-size:12px;color:#5f6368;margin-top:5px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.route-mini-actions{display:flex;gap:7px;margin-top:8px;}
.route-mini-action{font-size:11px;font-weight:700;color:#111;text-decoration:none;border:1px solid #dadce0;border-radius:999px;padding:6px 10px;background:#f5f5f5;white-space:nowrap;}
.route-mini-action.primary{background:#111;color:#fff;border-color:#111;}
@media (min-width:721px){
  body.route-card-mode #route-place-overlay{display:none!important;}
}
@media (max-width:720px){
  body.route-card-mode.sidebar-collapsed #route-place-overlay{bottom:64px;}
  body.route-card-mode:not(.sidebar-collapsed) #route-place-overlay{bottom:calc(46vh + 12px);opacity:0;transform:translateY(18px);pointer-events:none;}
  body.route-card-mode #sidebar{display:none!important;}
  body.route-card-mode #sidebar-float-toggle{display:none!important;}
  .route-card-track{padding-left:14px;padding-right:14px;gap:10px;}
  .route-mini-card{flex-basis:calc(100vw - 54px);min-height:90px;border-radius:16px;padding:10px 11px;}
  .route-mini-img{width:88px;height:68px;border-radius:12px;}
  .route-mini-name{font-size:17px;}
  .route-mini-meta{font-size:12px;}
  .route-mini-note{display:none;}
  .route-mini-actions{margin-top:6px;}
  .route-mini-action{font-size:11px;padding:5px 8px;}
}
@media (max-width:720px) and (orientation:landscape){
  body.route-card-mode.sidebar-collapsed #route-place-overlay{bottom:52px;}
  body.route-card-mode:not(.sidebar-collapsed) #route-place-overlay{bottom:calc(58vh + 8px);opacity:0;transform:translateY(14px);pointer-events:none;}
  .route-mini-card{flex-basis:min(408px, calc(100vw - 68px));min-height:76px;padding:8px 10px;}
  .route-mini-img{width:78px;height:56px;}
  .route-mini-name{font-size:15px;}
  .route-mini-kicker,.route-mini-note{display:none;}
  .route-mini-actions{display:none;}
}

</style>
</head>
<body>
<div id="loading">
  <div class="loading-dots">
    <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
  </div>
  <div class="loading-text">载入地图数据…</div>
</div>
<div id="app">
  <div id="topbar">
    <div id="logo">我的香港地图 <span>Personal Field Map · HK</span></div>
    <div id="filters">

// ── 推荐路线数据 ──
const ROUTES = [

const INIT_PLACES = [
  {id:1,name:'文武廟',cat:'heritage',lat:22.2840,lng:114.1502,desc:'1847年，香港最古老庙宇之一，廟內木雕彩繪工藝精緻'},
  {id:2,name:'荷李活道古董街',cat:'vintage',lat:22.2851,lng:114.1494,desc:'外銷瓷、舊廣州畫、民国木雕小件，跟十三行外銷史直接相關'},
  {id:3,name:'大館（前中央警署）',cat:'heritage',lat:22.2812,lng:114.1540,desc:'1840年代殖民建築群，活化為藝術中心，牢房仍開放'},
  {id:4,name:'PMQ 元創方',cat:'gallery',lat:22.2834,lng:114.1517,desc:'前警察宿舍，本地設計師品牌，建築本體值得拍'},
  {id:5,name:'九記牛腩',cat:'food',lat:22.2828,lng:114.1534,desc:'超過70年，中環結志街，清湯/咖喱牛腩，人均約80港幣'},
  {id:6,name:'油麻地果欄',cat:'market',lat:22.3122,lng:114.1686,desc:'1895年批發果欄建築群，仍在運作，夜間11點後最熱鬧'},
  {id:7,name:'廟街夜市',cat:'market',lat:22.3074,lng:114.1697,desc:'香港現存最老夜市，炒粉麵、煎釀三寶，人均50-80港幣'},
  {id:8,name:'White Cube 畫廊',cat:'gallery',lat:22.2818,lng:114.1573,desc:'干諾道中50號，El Anatsui雕塑展（3-5月），免費入場'},
  {id:9,name:'美荷樓生活館',cat:'heritage',lat:22.3339,lng:114.1637,desc:'1954年第一批公屋，免費展覽，呈現1950-70年代基層生活'},
  {id:10,name:'鴨寮街電子集市',cat:'vintage',lat:22.3306,lng:114.1615,desc:'舊相機、舊玩具、電子零件，本地人淘件的地方'},
  {id:11,name:'南蓮園池',cat:'scenery',lat:22.3396,lng:114.2045,desc:'唐朝風格古典園林，全程平坦，免費，早上9點前光線最美'},
  {id:12,name:'志蓮淨苑',cat:'heritage',lat:22.3405,lng:114.2051,desc:'仿唐木構無釘建築群，重點看榫卯邏輯和斗拱比例'},
  {id:13,name:'九龍寨城公園',cat:'heritage',lat:22.3321,lng:114.1903,desc:'舊寨城遺址，免費歷史展，每20分鐘一場'},
  {id:14,name:'金閣潮州酒家',cat:'food',lat:22.3279,lng:114.1885,desc:'開業60年，滷水鵝肝、凍烏頭魚，人均150港幣'},
  {id:15,name:'M+ 博物館',cat:'gallery',lat:22.3005,lng:114.1595,desc:'亞洲最大視覺文化博物館，設計/建築/影像藏品'},
  {id:16,name:'西九文化區海濱',cat:'scenery',lat:22.3002,lng:114.1559,desc:'觀察維港天際線的最佳點，傍晚5-6點光線最好'},
  {id:17,name:'雷生春',cat:'heritage',lat:22.3249,lng:114.1651,desc:'1931年轉角唐樓，中西合璧弧形立面，底層免費參觀'},
  {id:18,name:'Nan Kok 咖啡室',cat:'cafe',lat:22.3281,lng:114.1897,desc:'原金鋪改建，舊裝修保留，特色發酵腐乳意粉'},
  {id:19,name:'油麻地天后廟',cat:'heritage',lat:22.3112,lng:114.1715,desc:'1876年，廟宇建築群，清晨8點前香火最靜'},
  {id:20,name:'桂林街布料市場',cat:'market',lat:22.3280,lng:114.1580,desc:'傳統廣繡面料、鈕扣絲帶，對手工藝人有高參考價值'},
];

let places=[],nextId=1,activeFilter='ALL',gmarkers={},activeCard=null;
let addingMode=false,selectedCat='food',saving=false,map,infoWindow;
let activeRouteId=null,routeMarkers=[],routePolyline=null,activeStopIdx=null;
let sidebarCollapsed=false;
let placeService=null;
let routeCardScrollTimer=null;

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+type;
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='',2500);
}

async function loadPlaces(){
  try{
    const res=await fetch(WORKER_URL);
    const data=await res.json();
    places=Array.isArray(data)&&data.length>0?data:INIT_PLACES;
    if(!Array.isArray(data)||data.length===0)await savePlaces(false);
    nextId=Math.max(...places.map(p=>p.id),0)+1;
  }catch(e){places=INIT_PLACES;nextId=Math.max(...places.map(p=>p.id),0)+1;}
}

async function savePlaces(showToast=true){
  try{
    const res=await fetch(WORKER_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({places})});
    if(!res.ok)throw new Error();
    if(showToast)toast('已同步保存 ✓','success');
  }catch(e){if(showToast)toast('保存失败，请重试','error');}
}

// ── Map init ──
async function initMap(){
  await loadPlaces();
  const keyRes=await fetch(WORKER_URL+'/maps-key');
  const {key}=await keyRes.json();
  await new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src=`https://maps.googleapis.com/maps/api/js?key=${key}&language=zh-TW&libraries=places`; // Places library 用于自动搜索地点照片/评分
    s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:22.315,lng:114.175},zoom:13,
    styles:[
      {elementType:'geometry',stylers:[{color:'#f7f7f5'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#4b5563'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#ffffff'}]},
      {elementType:'labels.icon',stylers:[{visibility:'off'}]},
      {featureType:'administrative',elementType:'geometry.stroke',stylers:[{color:'#d4d4d8'}]},
      {featureType:'administrative.land_parcel',stylers:[{visibility:'off'}]},
      {featureType:'landscape',elementType:'geometry',stylers:[{color:'#f3f4f6'}]},
      {featureType:'poi',elementType:'geometry',stylers:[{color:'#ececec'}]},
      {featureType:'poi.park',elementType:'geometry',stylers:[{color:'#dbead7'}]},
      {featureType:'poi.park',elementType:'labels.text.fill',stylers:[{color:'#4f6b4f'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#ffffff'}]},
      {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#d6d6db'}]},
      {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#f3eadb'}]},
      {featureType:'road.highway',elementType:'geometry.stroke',stylers:[{color:'#dcc6a3'}]},
      {featureType:'road',elementType:'labels.icon',stylers:[{visibility:'off'}]},
      {featureType:'transit',elementType:'geometry',stylers:[{color:'#dbe4ef'}]},
      {featureType:'transit.line',elementType:'geometry',stylers:[{color:'#c7d7ea'}]},
      {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'transit',elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#dfeefe'}]},
      {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#5b7a98'}]},
    ],
    disableDefaultUI:false,zoomControl:true,streetViewControl:false,mapTypeControl:false,fullscreenControl:false,
  });
  infoWindow=new google.maps.InfoWindow({maxWidth:260});
  if(google.maps.places){ placeService=new google.maps.places.PlacesService(map); }
  map.addListener('click',e=>{
    infoWindow.close();
    if(!addingMode)return;
    exitAddingMode();
    openModal(e.latLng.lat(),e.latLng.lng());
  });
  document.getElementById('loading').classList.add('hidden');
  render();
  setSidebarCollapsed(false);
}


function makeMarkerIcon(cat,color){
  const c=color||((CATS[cat]||CATS.custom).color);
  const icon=CATS[cat]?CATS[cat].icon:'✦';
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="32" height="38" viewBox="0 0 32 38"><path d="M16 0C7.2 0 0 7.2 0 16c0 12 16 22 16 22s16-10 16-22C32 7.2 24.8 0 16 0z" fill="${c}" opacity="0.95"/><circle cx="16" cy="16" r="8" fill="rgba(0,0,0,0.2)"/><text x="16" y="20" text-anchor="middle" font-size="11">${icon}</text></svg>`;
  return{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(28,34),anchor:new google.maps.Point(14,34)};
}

function makeRouteStopIcon(num,color){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="32" height="38" viewBox="0 0 32 38"><path d="M16 0C7.2 0 0 7.2 0 16c0 12 16 22 16 22s16-10 16-22C32 7.2 24.8 0 16 0z" fill="${color}" opacity="0.95"/><circle cx="16" cy="16" r="9" fill="rgba(0,0,0,0.3)"/><text x="16" y="20.5" text-anchor="middle" font-size="11" font-weight="700" fill="white" font-family="sans-serif">${num}</text></svg>`;
  return{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(30,36),anchor:new google.maps.Point(15,36)};
}

function renderMarkers(){
  Object.values(gmarkers).forEach(m=>m.setMap(null));
  gmarkers={};
  if(activeFilter==='ROUTE')return;
  places.filter(p=>activeFilter==='ALL'||p.cat===activeFilter).forEach(p=>{
    const m=new google.maps.Marker({position:{lat:p.lat,lng:p.lng},map,icon:makeMarkerIcon(p.cat),title:p.name});
    m.addListener('click',()=>{
      const c=CATS[p.cat]||CATS.custom;
      infoWindow.setContent(`<div class="popup-inner"><div class="popup-cat" style="color:${c.color}">${c.icon} ${c.label}</div><div class="popup-name">${p.name}</div><div class="popup-desc">${p.desc||''}</div></div><div class="popup-actions"><div class="popup-btn" onclick="focusCard(${p.id})">列表中查看</div><div class="popup-btn del" onclick="deletePlace(${p.id})">删除</div></div>`);
      infoWindow.open(map,m);focusCard(p.id,false);
    });
    gmarkers[p.id]=m;
  });
}

function renderCards(){
  if(activeFilter==='ROUTE'){renderRoutePanel();return;}
  const visible=places.filter(p=>activeFilter==='ALL'||p.cat===activeFilter);
  const list=document.getElementById('card-list');
  const empty=document.getElementById('empty');
  document.getElementById('route-panel').classList.remove('visible');
  document.getElementById('card-list').style.display='';
  document.getElementById('empty').style.display='';
  document.getElementById('sidebar-title').textContent='地图标记';
  document.getElementById('sidebar-count').textContent=`${visible.length} 个地点`;
  if(visible.length===0){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=visible.map(p=>{
    const c=CATS[p.cat]||CATS.custom;
    return`<div class="card ${activeCard===p.id?'active':''}" id="card-${p.id}" onclick="focusCard(${p.id})"><div class="card-bar" style="background:${c.color}"></div><div style="flex:1;min-width:0"><div class="card-name">${p.name}</div><span class="card-tag" style="background:${c.color}22;color:${c.color}">${c.icon} ${c.label}</span>${p.desc?`<div class="card-desc">${p.desc}</div>`:''}</div></div>`;
  }).join('');
}

// ── Route Panel ──
function renderRoutePanel(){
  document.getElementById('card-list').style.display='none';
  document.getElementById('empty').style.display='none';
  document.getElementById('route-panel').classList.add('visible');
  document.getElementById('sidebar-title').textContent='推荐路线';
  document.getElementById('sidebar-count').textContent=`${ROUTES.length} 条路线`;
  if(!activeRouteId){
    document.getElementById('route-list-view').style.display='';
    document.getElementById('route-detail-view').style.display='none';
    document.getElementById('route-cards').innerHTML=ROUTES.map(r=>`
      <div class="route-card ${activeRouteId===r.id?'active':''}" onclick="selectRoute('${r.id}')">
        <div class="route-card-title">${r.title}</div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px">${r.desc}</div>
        <div class="route-card-meta">
          <span>🕐 ${r.duration}</span>
          <span>📍 ${r.distance}</span>
          <span>💠 ${r.stops.length} 个节点</span>
        </div>
      </div>`).join('');
  }
}

function selectRoute(id){
  activeRouteId=id;
  const route=ROUTES.find(r=>r.id===id);
  if(!route)return;
  // clear existing route
  clearRoute();
  // draw polyline
  const path=route.stops.map(s=>({lat:s.lat,lng:s.lng}));
  routePolyline=new google.maps.Polyline({
    path,map,
    strokeColor:route.color,
    strokeOpacity:0.8,
    strokeWeight:3,
    icons:[{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:3,strokeColor:route.color},offset:'100%',repeat:'80px'}]
  });
  // place stop markers
  route.stops.forEach((s,i)=>{
    const m=new google.maps.Marker({position:{lat:s.lat,lng:s.lng},map,icon:makeRouteStopIcon(i+1,route.color),title:s.name,zIndex:10});
    m.addListener('click',()=>showRouteStop(id,i));
    routeMarkers.push(m);
  });
  // fit bounds
  const bounds=new google.maps.LatLngBounds();
  route.stops.forEach(s=>bounds.extend({lat:s.lat,lng:s.lng}));
  map.fitBounds(bounds,getMapPadding());
  // show detail
  showRouteDetail(id);
}

function showRouteDetail(id){
  const route=ROUTES.find(r=>r.id===id);
  document.getElementById('route-list-view').style.display='none';
  document.getElementById('route-detail-view').style.display='flex';
  document.getElementById('sidebar-title').textContent=route.title;
  document.getElementById('sidebar-count').textContent=`${route.stops.length} 个节点`;
  document.getElementById('route-stops-list').innerHTML=route.stops.map((s,i)=>`
    <div class="route-stop ${activeStopIdx===i?'active-stop':''}" id="rstop-${i}" onclick="showRouteStop('${id}',${i})">
      <div class="route-stop-num" style="background:${route.color}">${i+1}</div>
      <div>
        <div class="route-stop-name">${s.name}</div>
        <div class="route-stop-desc">${s.desc}</div>
      </div>
    </div>`).join('');
}

function escapeHtml(str=''){
  return String(str).replace(/[&<>'\"]/g,ch=>({
    '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','\"':'&quot;'
  }[ch]));
}

function getAmapNavUrl(s,mode='walk'){
  const lng=Number(s.lng).toFixed(6);
  const lat=Number(s.lat).toFixed(6);
  const name=encodeURIComponent(s.name||'目的地');
  const navMode=mode==='drive'?'car':'walk';
  return `https://uri.amap.com/navigation?to=${lng},${lat},${name}&mode=${navMode}&coordinate=wgs84&callnative=1&src=mytourmap`;
}

function getAmapSchemeUrl(s,mode='walk'){
  const lng=Number(s.lng).toFixed(6);
  const lat=Number(s.lat).toFixed(6);
  const name=encodeURIComponent(s.name||'目的地');
  const travelType=mode==='drive'?'0':'2';
  return `amapuri://route/plan/?sourceApplication=mytourmap&dlat=${lat}&dlon=${lng}&dname=${name}&dev=0&t=${travelType}`;
}

function isIosSafari(){
  const ua=navigator.userAgent||'';
  const isIOS=/iP(hone|ad|od)/.test(ua);
  const isSafari=/Safari/i.test(ua)&&!/CriOS|FxiOS|EdgiOS|OPiOS|mercury/i.test(ua);
  return isIOS&&isSafari;
}

function openAmapNavigation(routeId,idx,mode='walk'){
  const route=ROUTES.find(r=>r.id===routeId);
  const stop=route?.stops?.[idx];
  if(!stop)return;
  const schemeUrl=getAmapSchemeUrl(stop,mode);
  const webUrl=getAmapNavUrl(stop,mode);
  if(isIosSafari()){
    window.location.href=schemeUrl;
    return;
  }
  const startedAt=Date.now();
  const fallbackTimer=setTimeout(()=>{
    if(document.visibilityState==='visible'&&Date.now()-startedAt<1800){
      window.location.replace(webUrl);
    }
  },900);
  const clearFallback=()=>{
    clearTimeout(fallbackTimer);
    document.removeEventListener('visibilitychange',clearFallback);
    window.removeEventListener('pagehide',clearFallback);
    window.removeEventListener('blur',clearFallback);
  };
  document.addEventListener('visibilitychange',clearFallback,{once:true});
  window.addEventListener('pagehide',clearFallback,{once:true});
  window.addEventListener('blur',clearFallback,{once:true});
  window.location.href=schemeUrl;
}

function isMobileLayout(){return window.matchMedia('(max-width:720px)').matches;}
function shouldUseMobileRouteCards(){return isMobileLayout();}

function getMapPadding(){
  if(isMobileLayout()){
    if(activeFilter==='ROUTE'&&activeRouteId){
      return sidebarCollapsed?{top:70,bottom:132,left:28,right:28}:{top:70,bottom:298,left:28,right:28};
    }
    return sidebarCollapsed?{top:70,bottom:86,left:34,right:34}:{top:70,bottom:280,left:34,right:34};
  }
  return sidebarCollapsed?{top:60,bottom:60,left:60,right:60}:{top:60,bottom:60,left:60,right:340};
}

function setSidebarCollapsed(v){
  if(shouldUseMobileRouteCards()&&activeFilter==='ROUTE'&&activeRouteId){
    sidebarCollapsed=true;
    document.body.classList.add('sidebar-collapsed');
    const floatBtn=document.getElementById('sidebar-float-toggle');
    const headBtn=document.getElementById('sidebar-head-toggle');
    if(floatBtn)floatBtn.textContent='展开侧栏';
    if(headBtn)headBtn.textContent='展开';
    setTimeout(()=>{ if(map)google.maps.event.trigger(map,'resize'); },300);
    return;
  }
  sidebarCollapsed=!!v;
  document.body.classList.toggle('sidebar-collapsed',sidebarCollapsed);
  const floatBtn=document.getElementById('sidebar-float-toggle');
  const headBtn=document.getElementById('sidebar-head-toggle');
  if(floatBtn)floatBtn.textContent=sidebarCollapsed?'展开侧栏':'收起侧栏';
  if(headBtn)headBtn.textContent=sidebarCollapsed?'展开':'收起';
  setTimeout(()=>{ if(map)google.maps.event.trigger(map,'resize'); },300);
}
function toggleSidebar(){setSidebarCollapsed(!sidebarCollapsed);}

function buildRouteMapCard(route,s,idx){
  const coord=`${Number(s.lat).toFixed(5)}, ${Number(s.lng).toFixed(5)}`;
  const mapsUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.name+' '+coord)}`;
  const label=idx===0?'起点':idx===route.stops.length-1?'终点':`第 ${idx+1} 站`;
  return `
    <div class="route-map-card">
      <div class="route-map-cover">
        <button class="route-map-close" onclick="closeRoutePlaceCard()">×</button>
        <div class="route-map-badge">${label}</div>
      </div>
      <div class="route-map-body">
        <div class="route-map-kicker">${escapeHtml(route.title)} · ${idx+1}/${route.stops.length}</div>
        <div class="route-map-name">${escapeHtml(s.name)}</div>
        <div class="route-map-meta">📍 ${coord}<br>步行路线节点</div>
        <div class="route-map-note"><span class="route-map-note-title">Notes from My Tour Map</span>${escapeHtml(s.desc||'暂无备注')}</div>
      </div>
      <div class="route-map-actions">
        <a class="route-map-action primary" href="#" onclick="event.preventDefault();openAmapNavigation('${route.id}',${idx},'walk')">高德导航</a>
        <a class="route-map-action" href="${mapsUrl}" target="_blank" rel="noopener">Google Maps</a>
      </div>
    </div>`;
}

function openRoutePlaceCard(route,s,idx){
  const el=document.getElementById('route-place-overlay');
  if(!el)return;
  el.innerHTML=buildRouteMapCard(route,s,idx);
  el.classList.add('open');
}
function closeRoutePlaceCard(){
  const el=document.getElementById('route-place-overlay');
  if(el){el.classList.remove('open');el.innerHTML='';}
}

function showRouteStop(routeId,idx){
  activeStopIdx=idx;
  activeRouteId=routeId;
  const route=ROUTES.find(r=>r.id===routeId);
  if(!route||!route.stops[idx])return;
  const s=route.stops[idx];
  if(isMobileLayout())setSidebarCollapsed(true);
  openRoutePlaceCard(route,s,idx);
  if(routeMarkers[idx]){
    routeMarkers[idx].setAnimation(google.maps.Animation.BOUNCE);
    setTimeout(()=>routeMarkers[idx]?.setAnimation(null),650);
  }
  map.panTo({lat:s.lat,lng:s.lng});
  if(map.getZoom()<15)map.setZoom(15);
  document.querySelectorAll('.route-stop').forEach((el,i)=>el.classList.toggle('active-stop',i===idx));
  document.getElementById(`rstop-${idx}`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function backToRouteList(){
  clearRoute();
  activeRouteId=null;activeStopIdx=null;
  document.getElementById('route-list-view').style.display='';
  document.getElementById('route-detail-view').style.display='none';
  document.getElementById('sidebar-title').textContent='推荐路线';
  document.getElementById('sidebar-count').textContent=`${ROUTES.length} 条路线`;
  infoWindow.close();
}

function clearRoute(){
  closeRoutePlaceCard();
  routeMarkers.forEach(m=>m.setMap(null));
  routeMarkers=[];
  if(routePolyline){routePolyline.setMap(null);routePolyline=null;}
}

function render(){renderMarkers();renderCards();}

function setFilter(cat){
  activeFilter=cat;
  document.querySelectorAll('.pill').forEach(el=>el.classList.toggle('active',el.dataset.cat===cat));
  activeCard=null;infoWindow?.close();closeRoutePlaceCard();
  if(cat!=='ROUTE'){clearRoute();activeRouteId=null;}
  render();
}

function focusCard(id,panMap=true){
  activeCard=id;
  const p=places.find(x=>x.id===id);
  if(!p)return;
  if(panMap&&map){map.panTo({lat:p.lat,lng:p.lng});map.setZoom(16);google.maps.event.trigger(gmarkers[id],'click');}
  renderCards();
  document.getElementById(`card-${id}`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function deletePlace(id){
  if(!confirm('确认删除这个地点？'))return;
  places=places.filter(p=>p.id!==id);
  infoWindow?.close();render();await savePlaces();
}

function buildCatGrid(){
  document.getElementById('cat-grid').innerHTML=Object.entries(CATS).map(([k,v])=>`<div class="cat-opt ${k===selectedCat?'selected':''}" style="${k===selectedCat?`border-color:${v.color};background:${v.color}22;color:${v.color}`:''}" onclick="selectCat('${k}')"><div style="font-size:16px;margin-bottom:3px">${v.icon}</div><div>${v.label}</div></div>`).join('');
}
function selectCat(k){selectedCat=k;buildCatGrid();}

function openModal(lat,lng){
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('f-name').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-lat').value=lat?lat.toFixed(5):'';
  document.getElementById('f-lng').value=lng?lng.toFixed(5):'';
  selectedCat='food';buildCatGrid();
  setTimeout(()=>document.getElementById('f-name').focus(),100);
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');exitAddingMode();}

async function savePoint(){
  if(saving)return;
  const name=document.getElementById('f-name').value.trim();
  const lat=parseFloat(document.getElementById('f-lat').value);
  const lng=parseFloat(document.getElementById('f-lng').value);
  if(!name){document.getElementById('f-name').focus();toast('请填写地点名称');return;}
  if(isNaN(lat)||isNaN(lng)){toast('请先在地图上点击选点');return;}
  saving=true;
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='保存中…';
  const p={id:nextId++,name,cat:selectedCat,lat,lng,desc:document.getElementById('f-desc').value.trim()};
  places.push(p);closeModal();
  if(activeFilter!=='ALL'&&activeFilter!==p.cat)setFilter(p.cat);else render();
  setTimeout(()=>focusCard(p.id),100);
  await savePlaces();
  saving=false;btn.disabled=false;btn.textContent='保存';
}

function toggleAdding(){
  if(addingMode){exitAddingMode();return;}
  addingMode=true;
  document.getElementById('click-hint').classList.add('visible');
  document.getElementById('addBtn').classList.add('active-add');
  document.getElementById('addBtn').textContent='× 取消选点';
  if(map)map.setOptions({draggableCursor:'crosshair'});
}
function exitAddingMode(){
  addingMode=false;
  document.getElementById('click-hint').classList.remove('visible');
  document.getElementById('addBtn').classList.remove('active-add');
  document.getElementById('addBtn').textContent='＋ 添加点位';
  if(map)map.setOptions({draggableCursor:null});
}



window.addEventListener('resize',()=>{
  if(activeRouteId){
    const route=ROUTES.find(r=>r.id===activeRouteId);
    if(route&&map){
      if(shouldUseMobileRouteCards())renderRouteCardStrip(route);else closeRoutePlaceCard();
      const bounds=new google.maps.LatLngBounds();
      route.stops.forEach(stop=>bounds.extend({lat:stop.lat,lng:stop.lng}));
      map.fitBounds(bounds,getMapPadding());
    }
  }
});



/* ===== V3：自动搜 Google Places 照片 + 底部小卡片横滑 ===== */
const PLACE_CACHE_KEY='mtm_places_photo_cache_v3';
function getPlaceCache(){try{return JSON.parse(localStorage.getItem(PLACE_CACHE_KEY)||'{}')||{};}catch(e){return {};}}
function setPlaceCache(cache){try{localStorage.setItem(PLACE_CACHE_KEY,JSON.stringify(cache));}catch(e){}}
function routeStopCacheKey(s){return `${s.name}|${Number(s.lat).toFixed(4)}|${Number(s.lng).toFixed(4)}`;}
function fallbackImgSvg(label){
  const safe=escapeHtml(String(label||'HK')).slice(0,8);
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#d8c09b"/><stop offset=".55" stop-color="#8fa17a"/><stop offset="1" stop-color="#55706b"/></linearGradient></defs><rect width="240" height="160" fill="url(#g)"/><circle cx="188" cy="40" r="38" fill="rgba(255,255,255,.18)"/><path d="M0 124 C45 104 75 112 112 94 C154 73 190 89 240 58 L240 160 L0 160 Z" fill="rgba(0,0,0,.22)"/><text x="18" y="136" font-size="22" font-weight="700" font-family="Arial" fill="rgba(255,255,255,.92)">${safe}</text></svg>`;
  return 'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg);
}
async function fetchPlaceMetaForStop(s){
  const cache=getPlaceCache();const key=routeStopCacheKey(s);const now=Date.now();
  if(cache[key]&&cache[key].ts&&now-cache[key].ts<1000*60*60*24*14){return cache[key];}
  if(!placeService||!google.maps.places){return null;}
  return new Promise(resolve=>{
    placeService.findPlaceFromQuery({query:`${s.name} 香港`,fields:['place_id','name','photos','rating','user_ratings_total','formatted_address','types'],locationBias:new google.maps.LatLng(s.lat,s.lng)},(results,status)=>{
      if(status!==google.maps.places.PlacesServiceStatus.OK||!results||!results[0]){
        const fallbackMeta={ts:now,unavailable:true,photo:'',rating:'',ratingTotal:'',address:'',type:''};
        cache[key]=fallbackMeta;setPlaceCache(cache);resolve(fallbackMeta);return;
      }
      const p=results[0];
      const photo=p.photos&&p.photos[0]?p.photos[0].getUrl({maxWidth:320,maxHeight:220}):'';
      const meta={ts:now,placeId:p.place_id||'',googleName:p.name||'',photo,rating:p.rating||'',ratingTotal:p.user_ratings_total||'',address:p.formatted_address||'',type:(p.types&&p.types[0])?String(p.types[0]).replace(/_/g,' '):''};
      cache[key]=meta;setPlaceCache(cache);resolve(meta);
    });
  });
}
function handleRouteImgError(imgEl){
  if(!imgEl||imgEl.dataset.fallbackApplied==='1')return;
  imgEl.dataset.fallbackApplied='1';
  imgEl.src=fallbackImgSvg(imgEl.dataset.placeName||'HK');
}
function buildRouteMiniCard(route,s,idx,meta={}){
  const coord=`${Number(s.lat).toFixed(5)}, ${Number(s.lng).toFixed(5)}`;
  const mapsUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((meta.googleName||s.name)+' '+coord)}`;
  const label=idx===0?'起点':idx===route.stops.length-1?'终点':`第 ${idx+1} 站`;
  const img=meta.photo||fallbackImgSvg(s.name);
  const rating=meta.rating?`${meta.rating} ★${meta.ratingTotal?` (${meta.ratingTotal})`:''}`:(meta.unavailable?'图片暂不可用':'Google Places 搜图');
  return `<div class="route-mini-card ${idx===activeStopIdx?'active':''}" id="route-mini-${idx}" data-stop-idx="${idx}" onclick="showRouteStop('${route.id}',${idx},true)"><img class="route-mini-img" src="${img}" alt="${escapeHtml(s.name)}" loading="lazy" data-place-name="${escapeHtml(s.name)}" onerror="handleRouteImgError(this)"><div class="route-mini-body"><div class="route-mini-kicker">${label} · ${escapeHtml(route.title)}</div><div class="route-mini-name">${escapeHtml(s.name)}</div><div class="route-mini-meta">${escapeHtml(rating)}${meta.type?' · '+escapeHtml(meta.type):''}</div><div class="route-mini-note">${escapeHtml(s.desc||'暂无备注')}</div><div class="route-mini-actions"><a class="route-mini-action primary" href="#" onclick="event.preventDefault();event.stopPropagation();openAmapNavigation('${route.id}',${idx},'walk')">高德导航</a><a class="route-mini-action" href="${mapsUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Google Maps</a></div></div></div>`;
}
function renderRouteCardStrip(route){
  const el=document.getElementById('route-place-overlay');if(!el||!route)return;
  if(!shouldUseMobileRouteCards()){closeRoutePlaceCard();return;}
  activeStopIdx=activeStopIdx??0;document.body.classList.add('route-card-mode');
  el.innerHTML=`<div class="route-card-track" id="route-card-track">${route.stops.map((s,i)=>buildRouteMiniCard(route,s,i)).join('')}</div>`;el.classList.add('open');
  const track=document.getElementById('route-card-track');
  if(track){track.addEventListener('scroll',()=>{clearTimeout(routeCardScrollTimer);routeCardScrollTimer=setTimeout(()=>syncRouteCardFromScroll(route.id),90);},{passive:true});}
  hydrateRouteCards(route);requestAnimationFrame(()=>showRouteStop(route.id,activeStopIdx,false));
}
async function hydrateRouteCards(route){
  for(let i=0;i<route.stops.length;i++){
    const meta=await fetchPlaceMetaForStop(route.stops[i]);if(!meta)continue;
    const old=document.getElementById(`route-mini-${i}`);if(old){const wrapper=document.createElement('div');wrapper.innerHTML=buildRouteMiniCard(route,route.stops[i],i,meta).trim();old.replaceWith(wrapper.firstElementChild);}
  }
}
function syncRouteCardFromScroll(routeId){
  const track=document.getElementById('route-card-track');if(!track)return;const cards=[...track.querySelectorAll('.route-mini-card')];const center=track.scrollLeft+track.clientWidth/2;let best=0,bestDist=Infinity;
  cards.forEach(card=>{const c=card.offsetLeft+card.offsetWidth/2;const d=Math.abs(c-center);if(d<bestDist){bestDist=d;best=Number(card.dataset.stopIdx)||0;}});
  if(best!==activeStopIdx)showRouteStop(routeId,best,false);
}
function updateRouteCardActive(idx,scrollToCard=true){document.querySelectorAll('.route-mini-card').forEach(card=>card.classList.toggle('active',Number(card.dataset.stopIdx)===idx));if(scrollToCard){document.getElementById(`route-mini-${idx}`)?.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}}
function updateRouteMarkerActive(route,idx){routeMarkers.forEach((m,i)=>{m.setIcon(makeRouteStopIcon(i+1,route.color,i===idx));m.setZIndex(i===idx?50:10);});}
function makeRouteStopIcon(num,color,active=false){
  const fill=active?'#111009':color;const ring=active?color:'rgba(0,0,0,0.3)';const scale=active?34:30, anchorX=active?17:15, anchorY=active?40:36;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="38" height="44" viewBox="0 0 32 38"><path d="M16 0C7.2 0 0 7.2 0 16c0 12 16 22 16 22s16-10 16-22C32 7.2 24.8 0 16 0z" fill="${fill}" opacity="0.98"/><circle cx="16" cy="16" r="10" fill="${ring}"/><text x="16" y="20.8" text-anchor="middle" font-size="11" font-weight="800" fill="white" font-family="Arial, sans-serif">${num}</text></svg>`;
  return{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(scale,anchorY),anchor:new google.maps.Point(anchorX,anchorY)};
}
function selectRoute(id){
  activeRouteId=id;activeStopIdx=0;const route=ROUTES.find(r=>r.id===id);if(!route)return;clearRoute();
  const path=route.stops.map(s=>({lat:s.lat,lng:s.lng}));
  routePolyline=new google.maps.Polyline({path,map,strokeColor:route.color,strokeOpacity:0.86,strokeWeight:4,icons:[{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:3.2,strokeColor:route.color},offset:'100%',repeat:'76px'}]});
  route.stops.forEach((s,i)=>{const m=new google.maps.Marker({position:{lat:s.lat,lng:s.lng},map,icon:makeRouteStopIcon(i+1,route.color,i===0),title:s.name,zIndex:i===0?50:10});m.addListener('click',()=>showRouteStop(id,i,true));routeMarkers.push(m);});
  const bounds=new google.maps.LatLngBounds();route.stops.forEach(s=>bounds.extend({lat:s.lat,lng:s.lng}));map.fitBounds(bounds,getMapPadding());showRouteDetail(id);if(isMobileLayout())setSidebarCollapsed(true);renderRouteCardStrip(route);
}
function showRouteStop(routeId,idx,scrollCard=true){
  activeStopIdx=idx;activeRouteId=routeId;const route=ROUTES.find(r=>r.id===routeId);if(!route||!route.stops[idx])return;const s=route.stops[idx];
  if(!shouldUseMobileRouteCards())closeRoutePlaceCard();
  updateRouteCardActive(idx,scrollCard);updateRouteMarkerActive(route,idx);map.panTo({lat:s.lat,lng:s.lng});if(map.getZoom()<15)map.setZoom(15);
  document.querySelectorAll('.route-stop').forEach((el,i)=>el.classList.toggle('active-stop',i===idx));document.getElementById(`rstop-${idx}`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeRoutePlaceCard(){const el=document.getElementById('route-place-overlay');if(el){el.classList.remove('open');el.innerHTML='';}document.body.classList.remove('route-card-mode');}
function clearRoute(){closeRoutePlaceCard();routeMarkers.forEach(m=>m.setMap(null));routeMarkers=[];if(routePolyline){routePolyline.setMap(null);routePolyline=null;}}


document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

initMap().catch(e=>{console.error(e);toast('地图加载失败','error');document.getElementById('loading').classList.add('hidden');});
</script>
