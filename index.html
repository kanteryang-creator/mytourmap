<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>我的香港地图</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#111009;--surface:#1a1710;--surface2:#222018;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e6ddd0;--muted:#7a7060;--dim:#4a4438;
  --gold:#c4965a;--gold-bg:rgba(196,150,90,0.12);
  --c-food:#e07b54;--c-cafe:#b8965a;--c-market:#7aab6e;
  --c-heritage:#6a98c8;--c-gallery:#a87ac8;--c-vintage:#c87a8a;
  --c-scenery:#5aab9e;--c-custom:#e0c060;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif}
#app{display:flex;flex-direction:column;height:100%}
#topbar{display:flex;align-items:center;background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;height:48px;flex-shrink:0;z-index:1000;}
#logo{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:300;color:var(--gold);letter-spacing:.12em;white-space:nowrap;margin-right:20px}
#logo span{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--muted);display:block;letter-spacing:.1em}
#filters{display:flex;gap:6px;align-items:center;flex:1;overflow-x:auto;padding:6px 0}
#filters::-webkit-scrollbar{display:none}
.pill{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;cursor:pointer;font-size:11px;white-space:nowrap;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s;flex-shrink:0;}
.pill .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pill.active{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.pill.all-pill.active{border-color:var(--gold);color:var(--gold)}
#addBtn{display:flex;align-items:center;gap:6px;margin-left:12px;flex-shrink:0;padding:5px 14px;border-radius:4px;cursor:pointer;background:var(--gold-bg);border:1px solid rgba(196,150,90,0.3);color:var(--gold);font-size:11px;font-weight:500;transition:all .2s;}
#addBtn:hover{background:rgba(196,150,90,0.2)}
#addBtn.active-add{background:rgba(196,150,90,0.25);border-color:var(--gold)}
#main{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1;height:100%}
#sidebar{width:300px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#sidebar-header{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
#sidebar-title{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:300;color:var(--text);margin-bottom:4px}
#sidebar-count{font-size:10px;color:var(--muted)}
#card-list{flex:1;overflow-y:auto;padding:8px}
#card-list::-webkit-scrollbar{width:3px}
#card-list::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.card{padding:11px 12px;border-radius:4px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:all .15s;display:flex;gap:10px;}
.card:hover{background:var(--surface2);border-color:var(--border)}
.card.active{background:var(--surface2);border-color:var(--border2)}
.card-bar{width:2px;border-radius:1px;flex-shrink:0;margin-top:3px;align-self:stretch}
.card-name{font-family:'Noto Serif TC',serif;font-size:12px;line-height:1.4;margin-bottom:3px;color:var(--text)}
.card-tag{font-size:9px;padding:1px 6px;border-radius:10px}
.card-desc{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.5}
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(3px);}
#modal-bg.open{display:flex}
#modal{background:var(--surface);border:1px solid var(--border2);border-radius:8px;width:380px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:modalIn .2s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:300;color:var(--gold)}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px 6px}
.modal-body{padding:18px 20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;letter-spacing:.12em;color:var(--muted);margin-bottom:6px}
.field input,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 10px;color:var(--text);font-size:12px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;}
.field input:focus,.field textarea:focus{border-color:var(--gold)}
.field textarea{resize:vertical;min-height:70px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.cat-opt{padding:7px 4px;border-radius:4px;cursor:pointer;text-align:center;border:1px solid var(--border);background:var(--surface2);font-size:10px;color:var(--muted);transition:all .15s;}
.cat-opt.selected{color:var(--text);border-width:1.5px}
.coord-row{display:flex;gap:8px}
.coord-row .field{flex:1;margin-bottom:0}
.coord-hint{font-size:10px;color:var(--muted);margin-top:6px;font-style:italic;line-height:1.5}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn{padding:7px 18px;border-radius:4px;font-size:12px;cursor:pointer;border:1px solid var(--border);transition:all .2s;font-family:'Noto Sans TC',sans-serif;}
.btn-cancel{background:transparent;color:var(--muted)}
.btn-save{background:var(--gold-bg);border-color:rgba(196,150,90,.4);color:var(--gold)}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:12px;padding:9px 20px;border-radius:20px;z-index:99999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1}
#toast.error{border-color:rgba(200,122,122,.5);color:#e89090}
#toast.success{border-color:rgba(122,171,110,.5);color:#a0d090}
#click-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(17,16,9,.9);border:1px solid var(--gold);color:var(--gold);font-size:11px;padding:7px 18px;border-radius:20px;z-index:800;pointer-events:none;display:none;letter-spacing:.05em;}
#click-hint.visible{display:block}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998;gap:16px;}
#loading.hidden{display:none}
.loading-dots{display:flex;gap:8px}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 1.2s ease infinite;}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.loading-text{font-family:'Noto Serif TC',serif;font-size:13px;color:var(--muted);letter-spacing:.1em}
#empty{padding:32px 16px;text-align:center;font-size:11px;color:var(--dim);line-height:1.8;display:none}
.gm-style .gm-style-iw-c{background:var(--surface)!important;border:1px solid var(--border2)!important;border-radius:4px!important;padding:0!important;box-shadow:0 4px 20px rgba(0,0,0,.6)!important;}
.gm-style .gm-style-iw-d{overflow:hidden!important}
.gm-style .gm-style-iw-t::after{background:var(--surface)!important}
.gm-style-iw-chr{display:none!important}
.popup-inner{padding:14px 16px;min-width:180px}
.popup-cat{font-size:9px;letter-spacing:.15em;margin-bottom:6px}
.popup-name{font-family:'Noto Serif TC',serif;font-size:14px;margin-bottom:6px;line-height:1.3;color:var(--text)}
.popup-desc{font-size:11px;color:var(--muted);line-height:1.6}
.popup-actions{display:flex;gap:8px;padding:8px 16px;border-top:1px solid var(--border)}
.popup-btn{flex:1;padding:5px;text-align:center;font-size:10px;border-radius:3px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;transition:all .15s;}
.popup-btn:hover{background:var(--surface2);color:var(--text)}
.popup-btn.del{color:#c87a7a}
.popup-btn.del:hover{border-color:#c87a7a}
</style>
</head>
<body>
<div id="loading">
  <div class="loading-dots">
    <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
  </div>
  <div class="loading-text">载入地图数据…</div>
</div>
<div id="app">
  <div id="topbar">
    <div id="logo">我的香港地图 <span>Personal Field Map · HK</span></div>
    <div id="filters">
      <div class="pill all-pill active" data-cat="ALL" onclick="setFilter('ALL')"><span class="dot" style="background:var(--gold)"></span>全部</div>
      <div class="pill" data-cat="food" onclick="setFilter('food')"><span class="dot" style="background:var(--c-food)"></span>饮食</div>
      <div class="pill" data-cat="cafe" onclick="setFilter('cafe')"><span class="dot" style="background:var(--c-cafe)"></span>咖啡·生活方式</div>
      <div class="pill" data-cat="market" onclick="setFilter('market')"><span class="dot" style="background:var(--c-market)"></span>市场·街市</div>
      <div class="pill" data-cat="heritage" onclick="setFilter('heritage')"><span class="dot" style="background:var(--c-heritage)"></span>旧建筑·文化</div>
      <div class="pill" data-cat="gallery" onclick="setFilter('gallery')"><span class="dot" style="background:var(--c-gallery)"></span>展览·画廊</div>
      <div class="pill" data-cat="vintage" onclick="setFilter('vintage')"><span class="dot" style="background:var(--c-vintage)"></span>古着·杂货</div>
      <div class="pill" data-cat="scenery" onclick="setFilter('scenery')"><span class="dot" style="background:var(--c-scenery)"></span>城市景观</div>
    </div>
    <div id="addBtn" onclick="toggleAdding()">＋ 添加点位</div>
  </div>
  <div id="main">
    <div id="map"></div>
    <div id="click-hint">点击地图上的位置来放置新标记</div>
    <div id="sidebar">
      <div id="sidebar-header">
        <div id="sidebar-title">地图标记</div>
        <div id="sidebar-count"></div>
      </div>
      <div id="card-list"></div>
      <div id="empty">暂无该类别的标记<br>点击「+ 添加点位」开始记录</div>
    </div>
  </div>
</div>
<div id="modal-bg">
  <div id="modal">
    <div class="modal-head">
      <div class="modal-title">添加新地点</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>地点名称</label><input id="f-name" placeholder="例：永华冰室" /></div>
      <div class="field"><label>类别</label><div class="cat-grid" id="cat-grid"></div></div>
      <div class="field"><label>简短备注</label><textarea id="f-desc" placeholder="为什么想去？有什么特别的？"></textarea></div>
      <div class="field">
        <label>坐标</label>
        <div class="coord-row">
          <div class="field"><input id="f-lat" placeholder="纬度 22.3xxx" /></div>
          <div class="field"><input id="f-lng" placeholder="经度 114.1xxx" /></div>
        </div>
        <div class="coord-hint">💡 关闭此窗口后在地图上点击可自动填入坐标</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-save" id="saveBtn" onclick="savePoint()">保存</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
const WORKER_URL = 'https://mytourmap.kanteryang.workers.dev';
const CATS = {
  food:     { label:'饮食',         icon:'🍜', color:'#e07b54' },
  cafe:     { label:'咖啡·生活方式', icon:'☕', color:'#b8965a' },
  market:   { label:'市场·街市',    icon:'🧺', color:'#7aab6e' },
  heritage: { label:'旧建筑·文化',  icon:'🏛', color:'#6a98c8' },
  gallery:  { label:'展览·画廊',    icon:'🎨', color:'#a87ac8' },
  vintage:  { label:'古着·杂货',    icon:'👗', color:'#c87a8a' },
  scenery:  { label:'城市景观',     icon:'🌆', color:'#5aab9e' },
  custom:   { label:'自定义',       icon:'✦',  color:'#e0c060' },
};
const INIT_PLACES = [
  {id:1,name:'文武廟',cat:'heritage',lat:22.2840,lng:114.1502,desc:'1847年，香港最古老庙宇之一，廟內木雕彩繪工藝精緻'},
  {id:2,name:'荷李活道古董街',cat:'vintage',lat:22.2851,lng:114.1494,desc:'外銷瓷、舊廣州畫、民国木雕小件，跟十三行外銷史直接相關'},
  {id:3,name:'大館（前中央警署）',cat:'heritage',lat:22.2812,lng:114.1540,desc:'1840年代殖民建築群，活化為藝術中心，牢房仍開放'},
  {id:4,name:'PMQ 元創方',cat:'gallery',lat:22.2834,lng:114.1517,desc:'前警察宿舍，本地設計師品牌，建築本體值得拍'},
  {id:5,name:'九記牛腩',cat:'food',lat:22.2828,lng:114.1534,desc:'超過70年，中環結志街，清湯/咖喱牛腩，人均約80港幣'},
  {id:6,name:'油麻地果欄',cat:'market',lat:22.3122,lng:114.1686,desc:'1895年批發果欄建築群，仍在運作，夜間11點後最熱鬧'},
  {id:7,name:'廟街夜市',cat:'market',lat:22.3074,lng:114.1697,desc:'香港現存最老夜市，炒粉麵、煎釀三寶，人均50-80港幣'},
  {id:8,name:'White Cube 畫廊',cat:'gallery',lat:22.2818,lng:114.1573,desc:'干諾道中50號，El Anatsui雕塑展（3-5月），免費入場'},
  {id:9,name:'美荷樓生活館',cat:'heritage',lat:22.3339,lng:114.1637,desc:'1954年第一批公屋，免費展覽，呈現1950-70年代基層生活'},
  {id:10,name:'鴨寮街電子集市',cat:'vintage',lat:22.3306,lng:114.1615,desc:'舊相機、舊玩具、電子零件，本地人淘件的地方'},
  {id:11,name:'南蓮園池',cat:'scenery',lat:22.3396,lng:114.2045,desc:'唐朝風格古典園林，全程平坦，免費，早上9點前光線最美'},
  {id:12,name:'志蓮淨苑',cat:'heritage',lat:22.3405,lng:114.2051,desc:'仿唐木構無釘建築群，重點看榫卯邏輯和斗拱比例'},
  {id:13,name:'九龍寨城公園',cat:'heritage',lat:22.3321,lng:114.1903,desc:'舊寨城遺址，免費歷史展，每20分鐘一場'},
  {id:14,name:'金閣潮州酒家',cat:'food',lat:22.3279,lng:114.1885,desc:'開業60年，滷水鵝肝、凍烏頭魚，人均150港幣'},
  {id:15,name:'M+ 博物館',cat:'gallery',lat:22.3005,lng:114.1595,desc:'亞洲最大視覺文化博物館，設計/建築/影像藏品'},
  {id:16,name:'西九文化區海濱',cat:'scenery',lat:22.3002,lng:114.1559,desc:'觀察維港天際線的最佳點，傍晚5-6點光線最好'},
  {id:17,name:'雷生春',cat:'heritage',lat:22.3249,lng:114.1651,desc:'1931年轉角唐樓，中西合璧弧形立面，底層免費參觀'},
  {id:18,name:'Nan Kok 咖啡室',cat:'cafe',lat:22.3281,lng:114.1897,desc:'原金鋪改建，舊裝修保留，特色發酵腐乳意粉'},
  {id:19,name:'油麻地天后廟',cat:'heritage',lat:22.3112,lng:114.1715,desc:'1876年，廟宇建築群，清晨8點前香火最靜'},
  {id:20,name:'桂林街布料市場',cat:'market',lat:22.3280,lng:114.1580,desc:'傳統廣繡面料、鈕扣絲帶，對手工藝人有高參考價值'},
];
let places=[],nextId=1,activeFilter='ALL',gmarkers={},activeCard=null,addingMode=false,selectedCat='food',saving=false,map,infoWindow;

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+type;
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='',2500);
}

async function loadPlaces(){
  try{
    const res=await fetch(WORKER_URL);
    const data=await res.json();
    places=Array.isArray(data)&&data.length>0?data:INIT_PLACES;
    if(!Array.isArray(data)||data.length===0)await savePlaces(false);
    nextId=Math.max(...places.map(p=>p.id),0)+1;
  }catch(e){
    places=INIT_PLACES;
    nextId=Math.max(...places.map(p=>p.id),0)+1;
  }
}

async function savePlaces(showToast=true){
  try{
    const res=await fetch(WORKER_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({places})});
    if(!res.ok)throw new Error();
    if(showToast)toast('已同步保存 ✓','success');
  }catch(e){if(showToast)toast('保存失败，请重试','error');}
}

async function initMap(){
  await loadPlaces();
  const keyRes=await fetch(WORKER_URL+'/maps-key');
  const {key}=await keyRes.json();
  await new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src=`https://maps.googleapis.com/maps/api/js?key=${key}&language=zh-TW`;
    s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:22.315,lng:114.175},zoom:13,
    styles:[
      {elementType:'geometry',stylers:[{color:'#1a1710'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#8a7e72'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#1a1710'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#2c2820'}]},
      {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#111009'}]},
      {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#3a3020'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#0e1a20'}]},
      {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#4e6d70'}]},
      {featureType:'poi',elementType:'geometry',stylers:[{color:'#1e1c14'}]},
      {featureType:'transit',elementType:'geometry',stylers:[{color:'#2f3948'}]},
      {featureType:'administrative',elementType:'geometry',stylers:[{color:'#3a3020'}]},
      {featureType:'landscape',elementType:'geometry',stylers:[{color:'#1a1810'}]},
      {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'transit',elementType:'labels.icon',stylers:[{visibility:'off'}]},
      {featureType:'transit',elementType:'labels.text.fill',stylers:[{color:'#3a3830'}]},
      {featureType:'road',elementType:'labels.icon',stylers:[{visibility:'off'}]},
      {elementType:'labels.icon',stylers:[{visibility:'off'}]},
    ],
    disableDefaultUI:false,zoomControl:true,streetViewControl:false,mapTypeControl:false,fullscreenControl:false,
  });
  infoWindow=new google.maps.InfoWindow({maxWidth:260});
  map.addListener('click',e=>{
    infoWindow.close();
    if(!addingMode)return;
    exitAddingMode();
    openModal(e.latLng.lat(),e.latLng.lng());
  });
  document.getElementById('loading').classList.add('hidden');
  render();
}

function makeMarkerIcon(cat){
  const c=CATS[cat]||CATS.custom;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="32" height="38" viewBox="0 0 32 38"><path d="M16 0C7.2 0 0 7.2 0 16c0 12 16 22 16 22s16-10 16-22C32 7.2 24.8 0 16 0z" fill="${c.color}" opacity="0.95"/><circle cx="16" cy="16" r="8" fill="rgba(0,0,0,0.2)"/><text x="16" y="20" text-anchor="middle" font-size="11">${c.icon}</text></svg>`;
  return{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(28,34),anchor:new google.maps.Point(14,34)};
}

function renderMarkers(){
  Object.values(gmarkers).forEach(m=>m.setMap(null));
  gmarkers={};
  places.filter(p=>activeFilter==='ALL'||p.cat===activeFilter).forEach(p=>{
    const marker=new google.maps.Marker({position:{lat:p.lat,lng:p.lng},map,icon:makeMarkerIcon(p.cat),title:p.name});
    marker.addListener('click',()=>{
      const c=CATS[p.cat]||CATS.custom;
      infoWindow.setContent(`<div class="popup-inner"><div class="popup-cat" style="color:${c.color}">${c.icon} ${c.label}</div><div class="popup-name">${p.name}</div><div class="popup-desc">${p.desc||''}</div></div><div class="popup-actions"><div class="popup-btn" onclick="focusCard(${p.id})">列表中查看</div><div class="popup-btn del" onclick="deletePlace(${p.id})">删除</div></div>`);
      infoWindow.open(map,marker);
      focusCard(p.id,false);
    });
    gmarkers[p.id]=marker;
  });
}

function renderCards(){
  const visible=places.filter(p=>activeFilter==='ALL'||p.cat===activeFilter);
  const list=document.getElementById('card-list');
  const empty=document.getElementById('empty');
  document.getElementById('sidebar-count').textContent=`${visible.length} 个地点`;
  if(visible.length===0){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=visible.map(p=>{
    const c=CATS[p.cat]||CATS.custom;
    return`<div class="card ${activeCard===p.id?'active':''}" id="card-${p.id}" onclick="focusCard(${p.id})"><div class="card-bar" style="background:${c.color}"></div><div style="flex:1;min-width:0"><div class="card-name">${p.name}</div><span class="card-tag" style="background:${c.color}22;color:${c.color}">${c.icon} ${c.label}</span>${p.desc?`<div class="card-desc">${p.desc}</div>`:''}</div></div>`;
  }).join('');
}

function render(){renderMarkers();renderCards();}

function setFilter(cat){
  activeFilter=cat;
  document.querySelectorAll('.pill').forEach(el=>el.classList.toggle('active',el.dataset.cat===cat));
  activeCard=null;infoWindow?.close();render();
}

function focusCard(id,panMap=true){
  activeCard=id;
  const p=places.find(x=>x.id===id);
  if(!p)return;
  if(panMap&&map){map.panTo({lat:p.lat,lng:p.lng});map.setZoom(16);google.maps.event.trigger(gmarkers[id],'click');}
  renderCards();
  document.getElementById(`card-${id}`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function deletePlace(id){
  if(!confirm('确认删除这个地点？'))return;
  places=places.filter(p=>p.id!==id);
  infoWindow?.close();render();await savePlaces();
}

function buildCatGrid(){
  document.getElementById('cat-grid').innerHTML=Object.entries(CATS).map(([k,v])=>`<div class="cat-opt ${k===selectedCat?'selected':''}" style="${k===selectedCat?`border-color:${v.color};background:${v.color}22;color:${v.color}`:''}" onclick="selectCat('${k}')"><div style="font-size:16px;margin-bottom:3px">${v.icon}</div><div>${v.label}</div></div>`).join('');
}
function selectCat(k){selectedCat=k;buildCatGrid();}

function openModal(lat,lng){
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('f-name').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-lat').value=lat?lat.toFixed(5):'';
  document.getElementById('f-lng').value=lng?lng.toFixed(5):'';
  selectedCat='food';buildCatGrid();
  setTimeout(()=>document.getElementById('f-name').focus(),100);
}

function closeModal(){document.getElementById('modal-bg').classList.remove('open');exitAddingMode();}

async function savePoint(){
  if(saving)return;
  const name=document.getElementById('f-name').value.trim();
  const lat=parseFloat(document.getElementById('f-lat').value);
  const lng=parseFloat(document.getElementById('f-lng').value);
  if(!name){document.getElementById('f-name').focus();toast('请填写地点名称');return;}
  if(isNaN(lat)||isNaN(lng)){toast('请先在地图上点击选点');return;}
  saving=true;
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='保存中…';
  const p={id:nextId++,name,cat:selectedCat,lat,lng,desc:document.getElementById('f-desc').value.trim()};
  places.push(p);closeModal();
  if(activeFilter!=='ALL'&&activeFilter!==p.cat)setFilter(p.cat);else render();
  setTimeout(()=>focusCard(p.id),100);
  await savePlaces();
  saving=false;btn.disabled=false;btn.textContent='保存';
}

function toggleAdding(){
  if(addingMode){exitAddingMode();return;}
  addingMode=true;
  document.getElementById('click-hint').classList.add('visible');
  document.getElementById('addBtn').classList.add('active-add');
  document.getElementById('addBtn').textContent='× 取消选点';
  if(map)map.setOptions({draggableCursor:'crosshair'});
}

function exitAddingMode(){
  addingMode=false;
  document.getElementById('click-hint').classList.remove('visible');
  document.getElementById('addBtn').classList.remove('active-add');
  document.getElementById('addBtn').textContent='＋ 添加点位';
  if(map)map.setOptions({draggableCursor:null});
}

document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

initMap().catch(e=>{
  console.error(e);
  toast('地图加载失败','error');
  document.getElementById('loading').classList.add('hidden');
});
</script>
</body>
</html>
